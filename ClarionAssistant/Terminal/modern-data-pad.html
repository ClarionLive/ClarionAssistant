<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CA Data</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 12px;
        background: #ffffff; color: #1f1f1f; overflow: hidden; }
    /* Tabbed shell: body is a flex column so #bar + .tab-bar sit at the top and the active tab panel
       fills the rest. Each .tabpanel is a flex column itself; the Data panel lets #list fill it. */
    body { display: flex; flex-direction: column; }
    #bar { display: flex; align-items: center; gap: 8px; padding: 5px 8px;
        background: #f3f3f3; border-bottom: 1px solid #d4d4d4; height: 30px; flex: none; }
    #bar .title { font-weight: 600; color: #1f1f1f; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #bar button { font: inherit; padding: 2px 8px; border: 1px solid #bcbcbc; border-radius: 4px;
        background: transparent; color: #0a5dc2; cursor: pointer; }
    #bar button:hover { background: #e4e8ee; }
    #filter { width: 100%; padding: 4px 8px; border: none; border-bottom: 1px solid #d4d4d4;
        font: inherit; background: #ffffff; color: #1f1f1f; flex: none; }
    /* #list used to be position:absolute (top:56px below the fixed 2-row header). Inside the tabbed
       shell it lives in #panel-data (a flex column) and simply fills the remaining space. */
    #list { flex: 1; overflow-y: auto; background: #ffffff; min-height: 0; }
    .section { font-weight: 600; color: #3a3a3a; background: #eef1f4; padding: 4px 10px;
        border-top: 1px solid #d4d4d4; border-bottom: 1px solid #d4d4d4;
        display: flex; align-items: center; gap: 6px;
        position: sticky; top: 0; z-index: 2; }   /* stick to the top while scrolling a long list */
    .section .sec-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .section .sec-ctl { display: flex; gap: 2px; flex: none; }
    .section .sec-btn { font-size: 12px; font-weight: 400; color: #5a5a5a; padding: 0 5px;
        border-radius: 3px; cursor: pointer; line-height: 1.5; }
    .section .sec-btn:hover { background: #dbe1e8; color: #1f1f1f; }
    /* Left-aligned columns for the tree scopes (Local/Global Data): a per-section grid whose subgrid rows
       share max-content columns, so type/picture line up under the longest name/type. Indent lives inside
       the name cell so nesting doesn't shift the type/picture columns. */
    .tgrid { display: grid; grid-template-columns: max-content max-content 1fr; }
    .row.trow { display: grid; grid-template-columns: subgrid; grid-column: 1 / -1; gap: 0; }
    .row.trow .namecell { display: flex; align-items: center; gap: 6px; white-space: nowrap; padding-right: 20px; }
    .row.trow .type { font-size: 10px; color: #5a5a5a; margin-left: 0; white-space: nowrap; padding-right: 20px; }
    .row.trow .picture { font-size: 10px; color: #0a7d3a; font-family: Consolas, 'Courier New', monospace;
        min-width: 0; text-align: left; white-space: nowrap; }
    /* Per-row edit/delete actions for Local/Global variables. visibility (not display) reserves the space so
       the max-content name column doesn't reflow on hover; the buttons are only revealed when the row is hovered. */
    .row.trow .acts { display: inline-flex; gap: 2px; margin-left: 6px; visibility: hidden; }
    .row.trow:hover .acts { visibility: visible; }
    /* Same left-aligned columns for the Other Files / Declared Tables COLUMN lists. The gutter (twisty +
       "+" detail toggle) lives inside the name cell so cols 2/3 stay aligned; detail panels span all tracks. */
    .fgrid { display: grid; grid-template-columns: max-content max-content 1fr; }
    .row.frow { display: grid; grid-template-columns: subgrid; grid-column: 1 / -1; gap: 0; padding: 3px 10px 3px 44px; }
    .row.frow .gcell { display: flex; align-items: center; gap: 4px; white-space: nowrap; padding-right: 20px; }
    .row.frow .type { font-size: 10px; color: #5a5a5a; margin-left: 0; white-space: nowrap; padding-right: 20px; }
    .row.frow .picture { font-size: 10px; color: #0a7d3a; font-family: Consolas, 'Courier New', monospace;
        min-width: 0; text-align: left; white-space: nowrap; }
    .fgrid .detail { grid-column: 1 / -1; }
    .tgrid .detail { grid-column: 1 / -1; }
    .row { display: flex; align-items: center; gap: 8px; padding: 3px 10px; cursor: pointer; user-select: none; }
    .row:hover { background: #e8eef7; }
    .row .kind { font-size: 10px; color: #6f42c1; min-width: 56px; }
    .row .name { color: #1f1f1f; }
    .row .type { font-size: 10px; color: #5a5a5a; margin-left: auto; }
    .row .picture { font-size: 10px; color: #0a7d3a; font-family: Consolas, 'Courier New', monospace; min-width: 40px; text-align: right; }
    .row .pre { font-size: 10px; color: #8a8a8a; margin-left: 8px; }
    .detail-tog { min-width: 12px; text-align: center; color: #0a5dc2; font-weight: bold; cursor: pointer; font-family: Consolas, 'Courier New', monospace; }
    .detail-tog:hover { color: #08408a; }
    .badge { font-size: 9px; font-weight: 700; padding: 0 4px; margin-left: 6px; border-radius: 3px; line-height: 1.4; }
    .badge.pk { background: #ffe7a3; color: #7a5b00; }
    .badge.uniq { background: #cfe3ff; color: #0a4a8a; }
    .detail { font-size: 11px; color: #555; background: #f6f8fa; border-left: 2px solid #cdd9e5; padding: 4px 10px; white-space: normal; }
    .detail .attr { font-family: Consolas, 'Courier New', monospace; color: #3a3a3a; }
    .detail .cmt { color: #0a7d3a; font-style: italic; }
    .comp-row { background: #f6f8fa; }
    .comp-row .name { color: #1f1f1f; }
    .row .act { color: #0a5dc2; cursor: pointer; min-width: 14px; text-align: center; opacity: 0.6; }
    .row .act:hover { opacity: 1; }
    .row .lineno { font-size: 10px; color: #0a5dc2; text-decoration: underline; cursor: pointer;
                   margin-left: auto; font-family: Consolas, 'Courier New', monospace; padding: 0 2px; }
    .row .lineno:hover { color: #1e66f5; background: #dbe6f5; }
    .row .params { font-size: 10px; color: #5a5a5a; margin-left: 6px; font-family: Consolas, 'Courier New', monospace; }
    .row.selected, .row.selected:hover { background: #cfe0f7; }
    /* Multi-select (Ctrl/Shift-click) — distinct from the proc single-select: stronger blue + left accent. */
    .row.multisel, .row.multisel:hover { background: #b9d4f5; box-shadow: inset 3px 0 0 #1e66f5; }
    .twisty { color: #555; min-width: 12px; display: inline-block; text-align: center; }
    .table-hdr { font-weight: 600; color: #0a5dc2; }
    .table-hdr .twisty { color: #555; min-width: 12px; }
    .col-row { padding-left: 26px; }
    .col-row .name { color: #b0152e; }
    .empty { padding: 14px; color: #777777; }
    #bar .counts { font-size: 11px; color: #5a5a5a; white-space: nowrap; flex: none; }
    #bar button.icon { padding: 2px 6px; }
    /* Filter clear (×) overlaid at the right of the full-width filter input — no layout shift.
       Positioned relative to #panel-data (position:relative) so it tracks the filter inside the tab. */
    #filterClear { position: absolute; right: 8px; top: 4px; z-index: 3; cursor: pointer; display: none;
        color: #8a8a8a; font-size: 14px; line-height: 1; padding: 2px 4px; user-select: none; }
    #filterClear:hover { color: #1f1f1f; }

    /* ===================== Version/solution banner (under #bar) ===================== */
    .ver-banner { display: flex; align-items: center; gap: 6px; flex: none;
        padding: 3px 10px; font-size: 11px; color: #5a5a64;
        background: #eef1f5; border-bottom: 1px solid #dfe3e8; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; }
    .ver-banner .vb-ico { font-size: 12px; }
    #verText { font-weight: 600; color: #0a5dc2; }
    body.dark .ver-banner { color: #9a9ab0; background: #21212e; border-bottom-color: #33333f; }
    body.dark #verText { color: #89b4fa; }

    /* ===================== Tab strip (Data | Files) — adapted from header.html .tab-bar/.tab ===================== */
    .tab-bar { display: flex; align-items: flex-end; gap: 2px; padding: 4px 8px 0 8px;
        background: #f3f3f3; border-bottom: 1px solid #d4d4d4; flex: none; }
    .tab { display: flex; align-items: center; gap: 5px; padding: 5px 14px;
        background: #e9ebee; border: 1px solid #d4d4d4; border-bottom: none;
        border-radius: 6px 6px 0 0; color: #5a5a5a; font-size: 12px; cursor: pointer;
        transition: all .12s; position: relative; top: 1px; user-select: none; }
    .tab:hover { background: #dfe3e8; color: #1f1f1f; }
    .tab.active { background: #ffffff; color: #1f1f1f; border-color: #bcbcbc; }
    .tab .dot { font-size: 13px; }

    /* Tab panels — NOTE: a distinct class (.tabpanel) so it does NOT collide with the Settings overlay's
       .panel (a floating popup). Only the .active panel is shown; each is a flex column. */
    .tabpanel { flex: 1; min-height: 0; display: none; flex-direction: column; }
    .tabpanel.active { display: flex; }
    #panel-data { position: relative; }   /* anchors #filterClear (absolute) to the Data panel */

    /* ===================== FILES TAB (#panel-files) — light defaults; body.dark overrides below ===================== */
    #panel-files { overflow: auto; }
    .files-toolbar { display: flex; align-items: center; gap: 6px; padding: 8px 10px;
        border-bottom: 1px solid #d4d4d4; flex: none; }
    .files-toolbar .btn { display: inline-flex; align-items: center; gap: 5px; height: 28px; padding: 0 11px;
        border: 1px solid #bcbcbc; border-radius: 6px; background: #f1f3f5; color: #1f1f1f;
        font: inherit; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .15s; }
    .files-toolbar .btn:hover { background: #e4e8ee; }
    .files-toolbar .btn-primary { background: #0a5dc2; border-color: #0a5dc2; color: #fff; }
    .files-toolbar .btn-primary:hover { background: #0b6ee0; border-color: #0b6ee0; }
    .files-toolbar .btn .ico { font-size: 13px; }
    .files-toolbar .toolbar-spacer { flex: 1; }
    .filter-wrap { position: relative; flex: none; }
    .filter-wrap input { height: 28px; width: 150px; padding: 0 24px 0 9px; background: #ffffff;
        border: 1px solid #bcbcbc; border-radius: 6px; color: #1f1f1f; font: inherit; font-size: 12px; outline: none; }
    .filter-wrap input:focus { border-color: #0a5dc2; }
    .filter-wrap .fx { position: absolute; right: 7px; top: 6px; color: #8a8a8a; font-size: 13px; cursor: pointer; display: none; }

    /* last-folder strip */
    .lastfolder { display: flex; align-items: center; gap: 6px; padding: 5px 10px;
        background: #eef1f4; border-bottom: 1px solid #d4d4d4; font-size: 11px; color: #3a3a3a; flex: none; }
    .lastfolder .path { font-family: Consolas, 'Courier New', monospace; color: #0a5dc2;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .lastfolder .change { margin-left: auto; color: #5a5a5a; cursor: pointer; text-decoration: underline dotted; flex: none; }
    .lastfolder .change:hover { color: #1f1f1f; }

    /* quick-location chips */
    .quick { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 10px 6px 10px; }
    .quick .ql-label { width: 100%; font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
        color: #888; margin-bottom: 2px; }
    .chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 12px;
        background: #eef1f4; border: 1px solid #d0d0d0; color: #3a3a3a; font-size: 11px; cursor: pointer; transition: all .12s; }
    .chip:hover { background: #e0e6ee; border-color: #0a5dc2; }
    .chip .star { color: #c08a00; }
    .chip.add { color: #888; border-style: dashed; }

    /* section header inside the Files list */
    .fsec { display: flex; align-items: center; gap: 6px; padding: 6px 10px 4px 10px;
        font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: #5a5a5a; margin-top: 4px; }
    .fsec .count { color: #888; font-weight: 400; }
    .fsec .sec-line { flex: 1; height: 1px; background: #d4d4d4; margin-left: 4px; }
    .fsec.grp { cursor: pointer; }
    .fsec.grp .caret { font-size: 9px; color: #888; width: 10px; display: inline-block; }
    .fsec.grp:hover { color: #1f1f1f; }
    .fsec-note { padding: 2px 10px 4px 26px; font-size: 10px; color: #888; font-style: italic; }

    /* class .inc/.clw chips */
    .pairchip { font-family: Consolas, 'Courier New', monospace; font-size: 9px; padding: 1px 5px; border-radius: 8px;
        margin-left: 5px; border: 1px solid #d0d0d0; background: #eef1f4; cursor: pointer; }
    .pairchip.inc { color: #0a7d3a; border-color: rgba(10,125,58,.35); }
    .pairchip.clw { color: #0a5dc2; border-color: rgba(10,93,194,.35); }
    .pairchip:hover { background: #e0e6ee; }
    .pairchip.missing { opacity: .4; }

    /* file rows */
    .frow2 { display: grid; grid-template-columns: 24px 1fr auto auto; align-items: center; gap: 8px;
        padding: 5px 10px; cursor: pointer; user-select: none; border-left: 2px solid transparent; }
    .frow2:hover { background: #e8eef7; border-left-color: #0a5dc2; }
    .frow2.missing { opacity: .45; }
    .frow2 .fico { font-size: 15px; text-align: center; }
    .frow2 .meta { min-width: 0; }
    .frow2 .fname { color: #1f1f1f; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .frow2 .fname .ext { color: #0a5dc2; font-weight: 600; }
    .frow2 .fpath { font-family: Consolas, 'Courier New', monospace; font-size: 10px; color: #888;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .frow2 .ftime { font-size: 10px; color: #888; white-space: nowrap; }
    .frow2 .acts { display: inline-flex; gap: 2px; visibility: hidden; }
    .frow2:hover .acts { visibility: visible; }
    .frow2 .acts .a { width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center;
        border-radius: 4px; color: #5a5a5a; font-size: 13px; }
    .frow2 .acts .a:hover { background: #dbe1e8; color: #1f1f1f; }
    .frow2 .acts .a.del:hover { background: rgba(176,21,46,.12); color: #b0152e; }
    .frow2 .acts .a.both { color: #0a7d3a; }
    .frow2 .pin { color: #c08a00; font-size: 12px; }

    /* drop hint / drop zone */
    .drophint { margin: 10px; padding: 14px; border: 1.5px dashed #c4c4c4; border-radius: 8px;
        text-align: center; color: #888; font-size: 11px; }
    .drophint b { color: #5a5a5a; }
    .drophint.dragover { border-color: #0a5dc2; background: rgba(10,93,194,.08); color: #0a5dc2; }
    .files-empty { padding: 14px; color: #777; }

    /* ----- Files tab — dark ----- */
    body.dark .files-toolbar { border-bottom-color: #3a3a4a; }
    body.dark .files-toolbar .btn { background: #313244; border-color: #313244; color: #d4d4d4; }
    body.dark .files-toolbar .btn:hover { background: #3a3a52; }
    body.dark .files-toolbar .btn-primary { background: #1e66a8; border-color: #1e66a8; color: #fff; }
    body.dark .files-toolbar .btn-primary:hover { background: #2580d4; border-color: #2580d4; }
    body.dark .filter-wrap input { background: #1a1a28; border-color: #313244; color: #cdd6f4; }
    body.dark .filter-wrap input:focus { border-color: #89b4fa; }
    body.dark .filter-wrap .fx { color: #6c7086; }
    body.dark .lastfolder { background: #1a1a28; border-bottom-color: #3a3a4a; color: #a6adc8; }
    body.dark .lastfolder .path { color: #89b4fa; }
    body.dark .lastfolder .change { color: #6c7086; }
    body.dark .lastfolder .change:hover { color: #cdd6f4; }
    body.dark .quick .ql-label { color: #6c7086; }
    body.dark .chip { background: #313244; border-color: #313244; color: #bac2de; }
    body.dark .chip:hover { background: #3a3a52; border-color: #89b4fa; }
    body.dark .chip .star { color: #fab387; }
    body.dark .chip.add { color: #6c7086; }
    body.dark .fsec { color: #a6adc8; }
    body.dark .fsec .count { color: #6c7086; }
    body.dark .fsec .sec-line { background: #3a3a4a; }
    body.dark .fsec.grp .caret { color: #6c7086; }
    body.dark .fsec.grp:hover { color: #cdd6f4; }
    body.dark .fsec-note { color: #6c7086; }
    body.dark .pairchip { border-color: #313244; background: #313244; }
    body.dark .pairchip.inc { color: #a6e3a1; border-color: rgba(166,227,161,.35); }
    body.dark .pairchip.clw { color: #89b4fa; border-color: rgba(137,180,250,.35); }
    body.dark .pairchip:hover { background: #3a3a52; }
    body.dark .frow2:hover { background: #2d2d44; border-left-color: #89b4fa; }
    body.dark .frow2 .fname { color: #e0e0e0; }
    body.dark .frow2 .fname .ext { color: #89b4fa; }
    body.dark .frow2 .fpath, body.dark .frow2 .ftime { color: #6c7086; }
    body.dark .frow2 .acts .a { color: #9a9ab0; }
    body.dark .frow2 .acts .a:hover { background: #3a3a52; color: #fff; }
    body.dark .frow2 .acts .a.del:hover { background: rgba(243,139,168,.15); color: #f38ba8; }
    body.dark .frow2 .acts .a.both { color: #a6e3a1; }
    body.dark .frow2 .pin { color: #fab387; }
    body.dark .drophint { border-color: #313244; color: #6c7086; }
    body.dark .drophint b { color: #a6adc8; }
    body.dark .drophint.dragover { border-color: #89b4fa; background: rgba(137,180,250,.1); color: #89b4fa; }
    body.dark .files-empty { color: #9a9ab0; }

    /* ===================== Dark theme (body.dark) — mirrors the editor's dark look ===================== */
    body.dark { background: #1e1e2e; color: #d4d4d4; }
    body.dark #bar { background: #252535; border-bottom-color: #3a3a4a; }
    body.dark #bar .title { color: #e6e6e6; }
    body.dark #bar .counts { color: #9a9ab0; }
    body.dark #bar button { border-color: #45455a; color: #6cb6ff; }
    body.dark #bar button:hover { background: #33334a; }
    body.dark #filter { background: #1e1e2e; color: #d4d4d4; border-bottom-color: #3a3a4a; }
    body.dark #filterClear { color: #8a8aa0; }
    body.dark #filterClear:hover { color: #e6e6e6; }
    body.dark #list { background: #1e1e2e; }
    body.dark .section { background: #2a2a3c; color: #c8c8d8; border-top-color: #3a3a4a; border-bottom-color: #3a3a4a; }
    body.dark .section .sec-btn { color: #9a9ab0; }
    body.dark .section .sec-btn:hover { background: #3a3a52; color: #e6e6e6; }
    body.dark .row:hover { background: #2d2d44; }
    body.dark .row .name { color: #e0e0e0; }
    body.dark .row .kind { color: #c08cf0; }
    body.dark .row .type { color: #9a9ab0; }
    body.dark .row .picture { color: #5fd38a; }
    body.dark .row .pre { color: #888; }
    body.dark .row.trow .type, body.dark .row.frow .type { color: #9a9ab0; }
    body.dark .row.trow .picture, body.dark .row.frow .picture { color: #5fd38a; }
    body.dark .row.selected, body.dark .row.selected:hover { background: #2f4a6b; }
    body.dark .row.multisel, body.dark .row.multisel:hover { background: #234063; box-shadow: inset 3px 0 0 #4a9eff; }
    body.dark .twisty, body.dark .table-hdr .twisty { color: #9a9ab0; }
    body.dark .table-hdr { color: #6cb6ff; }
    body.dark .col-row .name { color: #ff8095; }
    body.dark .detail-tog { color: #6cb6ff; }
    body.dark .detail-tog:hover { color: #9accff; }
    body.dark .detail { color: #b0b0c0; background: #26263a; border-left-color: #3a4a5a; }
    body.dark .detail .attr { color: #c8c8d8; }
    body.dark .detail .cmt { color: #5fd38a; }
    body.dark .comp-row { background: #26263a; }
    body.dark .comp-row .name { color: #e0e0e0; }
    body.dark .row .lineno { color: #6cb6ff; }
    body.dark .row .lineno:hover { color: #9accff; background: #2d3f5a; }
    body.dark .row .params { color: #9a9ab0; }
    body.dark .badge.pk { background: #5a4a1a; color: #ffd479; }
    body.dark .badge.uniq { background: #1f3a5a; color: #9accff; }
    body.dark .empty { color: #9a9ab0; }

    /* Tab strip — dark */
    body.dark .tab-bar { background: #252535; border-bottom-color: #3a3a4a; }
    body.dark .tab { background: #252536; border-color: #313244; color: #7f849c; }
    body.dark .tab:hover { background: #313244; color: #bac2de; }
    body.dark .tab.active { background: #1e1e2e; color: #cdd6f4; border-color: #45475a; }

    /* ===================== Settings overlay (section customization) ===================== */
    /* Floating, draggable popup — no dimmed backdrop. The wrapper passes pointer events through so
       the pad list behind it stays fully interactive (live preview while you tweak the layout). */
    .overlay { position: fixed; inset: 0; background: transparent; pointer-events: none; z-index: 50; }
    .panel { position: fixed; top: 40px; right: 12px; pointer-events: auto;
        background: #ffffff; color: #1f1f1f; width: min(420px, 92%);
        max-height: 84vh; display: flex; flex-direction: column; border: 1px solid #c4c4c4;
        border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.45); overflow: hidden; }
    .panel-hdr { padding: 8px 12px; font-weight: 600; background: #eef1f4;
        border-bottom: 1px solid #d4d4d4; display: flex; align-items: center;
        cursor: move; user-select: none; }
    .panel-hdr #settingsClose { margin-left: auto; cursor: pointer; font-size: 16px; color: #777; padding: 0 4px; }
    .panel-hdr #settingsClose:hover { color: #1f1f1f; }
    .panel-body { padding: 8px 12px; overflow-y: auto; }
    .zone-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin: 8px 0 4px; }
    .zone { display: flex; flex-direction: column; gap: 4px; min-height: 6px; }
    .hidden-zone .scard { opacity: 0.8; }
    .scard { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border: 1px solid #d0d0d0;
        border-radius: 5px; background: #f7f8fa; }
    .scard.drop-target { border-color: #0a5dc2; box-shadow: 0 0 0 1px #0a5dc2 inset; }
    /* A Local/Global section header lit up as a paste / drag-drop target for variable definitions. */
    .section.drop-target { outline: 2px dashed #0a5dc2; outline-offset: -2px; background: rgba(10,93,194,0.08); }
    .scard .handle { cursor: grab; color: #999; user-select: none; }
    .scard .slabel { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .scard .sbtn { cursor: pointer; color: #5a5a5a; padding: 0 5px; border-radius: 3px;
        border: 1px solid transparent; line-height: 1.5; font-size: 11px; }
    .scard .sbtn:hover { background: #e0e6ee; color: #1f1f1f; }
    .scard .sbtn[disabled] { opacity: 0.3; cursor: default; pointer-events: none; }
    .panel-ftr { padding: 8px 12px; border-top: 1px solid #d4d4d4; background: #f7f8fa;
        display: flex; align-items: center; gap: 10px; }
    .panel-ftr label { display: flex; align-items: center; gap: 5px; cursor: pointer; flex: 1; }
    .panel-ftr #resetSettingsBtn { font: inherit; padding: 3px 8px; border: 1px solid #bcbcbc;
        border-radius: 4px; background: transparent; color: #0a5dc2; cursor: pointer; }
    .panel-ftr #resetSettingsBtn:hover { background: #e4e8ee; }
    .hint { font-size: 11px; color: #999; padding: 4px 2px; }

    body.dark .panel { background: #252535; color: #d4d4d4; border-color: #3a3a4a; }
    body.dark .panel-hdr { background: #2a2a3c; border-bottom-color: #3a3a4a; }
    body.dark .panel-hdr #settingsClose { color: #9a9ab0; }
    body.dark .panel-hdr #settingsClose:hover { color: #e6e6e6; }
    body.dark .zone-label { color: #8a8aa0; }
    body.dark .scard { background: #2a2a3c; border-color: #3a3a4a; }
    body.dark .scard .handle { color: #7a7a90; }
    body.dark .scard .sbtn { color: #9a9ab0; }
    body.dark .scard .sbtn:hover { background: #3a3a52; color: #e6e6e6; }
    body.dark .scard.drop-target { border-color: #6cb6ff; box-shadow: 0 0 0 1px #6cb6ff inset; }
    body.dark .panel-ftr { background: #2a2a3c; border-top-color: #3a3a4a; }
    body.dark .panel-ftr #resetSettingsBtn { border-color: #45455a; color: #6cb6ff; }
    body.dark .panel-ftr #resetSettingsBtn:hover { background: #33334a; }
    body.dark .hint { color: #7a7a90; }

    /* ?mode=settings — the page IS the floating window's content: hide the pad chrome and let the panel
       fill the client area. The native tool-window caption supplies the title, move, and close. */
    body.settings-mode #bar, body.settings-mode #filter, body.settings-mode #filterClear, body.settings-mode #list,
    body.settings-mode .tab-bar, body.settings-mode .tabpanel { display: none !important; }
    body.settings-mode { overflow: hidden; }
    body.settings-mode .overlay { position: static; pointer-events: auto; }
    body.settings-mode .panel { position: static; top: auto; right: auto; width: 100%; height: 100vh;
        max-height: none; border: none; border-radius: 0; box-shadow: none; }
    body.settings-mode .panel-hdr { display: none; }
</style>
</head>
<body>
    <div id="bar">
        <span class="title" id="title">Explorer</span>
        <span class="counts" id="counts"></span>
        <button id="fontDec" class="icon" title="Smaller font">A−</button>
        <button id="fontInc" class="icon" title="Larger font">A+</button>
        <button id="themeBtn" class="icon" title="Toggle dark mode">🌙</button>
        <button id="refreshBtn" title="Refresh from the active CA Embeditor">Refresh</button>
        <button id="settingsBtn" class="icon" title="Customize sections (reorder, hide, expand)">⚙</button>
    </div>

    <!-- Version/solution banner: recents & pinned folders are saved PER Clarion version + solution
         (see ExplorerRecentsStore). Showing the active bucket makes a version switch obvious — i.e. why a
         different Clarion version shows different recents. Populated by the host's setVersionInfo message. -->
    <div id="verBanner" class="ver-banner" title="Recent files and pinned folders are saved per Clarion version and solution. This shows the active bucket.">
        <span class="vb-ico">📦</span><span id="verText">—</span>
    </div>

    <!-- Tab strip: Data (the original Data Pad) | Files (Monaco file loader). pick() toggles .active. -->
    <div class="tab-bar">
        <div class="tab active" data-tab="data" onclick="pick('data')"><span class="dot">📊</span>Data</div>
        <div class="tab" data-tab="files" onclick="pick('files')"><span class="dot">📁</span>Files</div>
    </div>

    <!-- ===================== DATA PANEL — the original Data Pad UI, IDs unchanged ===================== -->
    <div class="tabpanel active" id="panel-data">
        <input id="filter" placeholder="Filter…" />
        <span id="filterClear" title="Clear filter (Esc)">×</span>
        <div id="list"><div class="empty">Open a procedure in the CA Embeditor, then Refresh.</div></div>
    </div>

    <!-- ===================== FILES PANEL — Monaco file loader (rendered by renderExplorer) ===================== -->
    <div class="tabpanel" id="panel-files">
        <div class="files-toolbar">
            <button class="btn btn-primary" id="loadFileBtn" title="Open a file into the Monaco editor"><span class="ico">📂</span>Load File…</button>
            <button class="btn" id="compareBtn" title="Pick two files and diff them in Monaco"><span class="ico">⇄</span>Compare…</button>
            <span class="toolbar-spacer"></span>
            <span class="filter-wrap">
                <input type="text" id="filesFilter" placeholder="Filter recents…" />
                <span class="fx" id="filesFilterClear" title="Clear filter">×</span>
            </span>
        </div>

        <div class="lastfolder" id="lastFolderStrip" style="display:none;">
            <span>📍 Last folder:</span>
            <span class="path" id="lastFolderPath"></span>
            <span class="change" id="lastFolderChange" title="Pick a different folder">change</span>
        </div>

        <!-- Scrollable region: quick chips + pinned + grouped recents + drop zone (built in JS). -->
        <div id="filesScroll" style="flex:1; min-height:0; overflow:auto;">
            <div id="filesBody"></div>
            <!-- In-page drop hint is hidden: WebView2 strips real file paths from page drops, so external file
                 drops are handled by the host's native drop strip (docked below the WebView2 on the Files tab). -->
            <div class="drophint" id="dropZone" style="display:none;">⬇ <b>Drop files here</b> to open them in Monaco</div>
        </div>
    </div>

    <!-- Section customization overlay (opened by the ⚙ button). Cards built dynamically in JS. -->
    <div id="settingsOverlay" class="overlay" style="display:none;">
        <div class="panel">
            <div class="panel-hdr">Data Pad Settings<span id="settingsClose" title="Close">×</span></div>
            <div class="panel-body">
                <div class="zone-label">Visible — drag ⠿ or use ▲▼ to reorder · ▾/▸ sets default expand</div>
                <div id="visibleZone" class="zone"></div>
                <div class="zone-label">Hidden</div>
                <div id="hiddenZone" class="zone hidden-zone"></div>
            </div>
            <div class="panel-ftr">
                <label><input type="checkbox" id="hideEmptyChk"> Hide empty sections</label>
                <button id="resetSettingsBtn" title="Restore the default order, show all sections">Reset to defaults</button>
            </div>
        </div>
    </div>

<script>
    // Surface any uncaught JS error as a visible banner instead of a silent blank pane (a blank settings window
    // with no error text is undebuggable). Inserted FIRST so it also catches errors thrown during startup.
    window.onerror = function (msg, src, line, col) {
        try {
            var b = document.createElement('div');
            b.style.cssText = 'position:fixed;left:0;top:0;right:0;z-index:99999;background:#a00;color:#fff;'
                + 'font:12px/1.4 monospace;padding:6px 8px;white-space:pre-wrap;';
            b.textContent = 'Data pad error: ' + msg + '  (' + (src || '') + ':' + line + ':' + col + ')';
            (document.body || document.documentElement).appendChild(b);
        } catch (e) {}
        return false;
    };

    // When loaded as ?mode=settings the SAME page renders ONLY the settings card UI (pad chrome hidden) for
    // the floating native settings window. It edits + persists the layout state and posts changes to its host,
    // which pushes them live to the docked pad. This reuses the exact UI with no duplication.
    var SETTINGS_MODE = /[?&]mode=settings/.test(location.search);

    var locals = [];
    var tables = [];
    var otherFiles = [];
    var browseFiles = [];      // .txa fallback only (File-Browsing List Box primary + key); folded into fileScopes
    var fileScopes = [];       // per-template-instance file groups from the live FileSchemaTree (the native pad's grouping)
    var routines = [];
    var localProcedures = [];   // the proc's LOCAL procedures (col-0 "Name PROCEDURE" bodies), with line numbers
    var moduleData = [];
    var globals = [];
    var procedures = [];
    var renderedProcedure = '';  // the procedure the current payload is for — sent with ＋Add so the host validates against the on-screen procedure
    var hoverScope = null;       // 'local'|'global' when the pointer is over that section header — arms Ctrl+V paste
    // Per-session random token stamped into every in-pad column drag (application/x-ca-column). The drop handler
    // only honors column drags carrying THIS token — an external drag source can set the MIME but can't know it,
    // so foreign drags can't drive the lossless column-copy path.
    var DRAG_NONCE = 'ca' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    var selectedProc = null;   // Procedures section: the row the user single-clicked (header "Open" target)
    var collapsed = {};        // tableName -> true when a table's columns are collapsed
    var sectionCollapsed = {}; // section key -> true when a whole section is collapsed
    var localCollapsed = {};   // local-tree node path -> true when a QUEUE/GROUP node is collapsed
    var detailOpen = {};       // node path -> true when an Other Files "+" detail panel is expanded
    var relExpanded = {};      // relations-folder path -> true when expanded (DEFAULT collapsed, unlike Keys/Columns)
    // Multi-select (drag a block of items): Ctrl/Cmd-click toggles a row, Shift-click selects a range.
    var selSet = {};           // selkey -> insert text (the current multi-selection)
    var selOrder = [];         // [{key,text}] in the LAST render order — shift-range anchor + block order
    var lastSel = null;        // selkey of the last Ctrl/Shift-clicked row (the shift-range anchor)
    var _selOcc = {};          // render-scoped: text -> occurrence count, so duplicate names get stable keys
    // UI-polish state (all persisted in the same UI-state blob as the collapse maps).
    var darkMode = false;      // pad dark theme
    var fontScale = 1;         // pad font-size multiplier (base 12px)
    var _totalShown = 0;       // unfiltered insertable-row count, for the "N / M" filter readout
    var procTitle = '';        // the active procedure/file context from setSymbols — shown in #counts, since #title is now the fixed "Explorer" pad name

    // ---- Section customization (Settings ⚙) — persisted in the same UI-state blob. ----
    // sectionOrder is the user's display order of section ids; empty = canonical default below.
    // sectionHidden marks ids the user moved to the "Hidden" tray. Per-section expand/collapse
    // reuses the existing sectionCollapsed map (already persisted) so there is ONE source of truth.
    var sectionOrder = [];          // [id, ...] in display order; [] means use DEFAULT_SECTION_ORDER
    var sectionHidden = {};         // section id -> true when hidden from the pad
    var hideEmptySections = true;   // when true, sections with no data are not rendered (default — matches the pad's historical behavior)
    // sectionCollapsed is SHARED between the pad header-twisty and the settings window's ▾/▸ toggle. To avoid the
    // settings window's stale open-time snapshot clobbering whole-section collapses the user makes in the pad
    // while the window is open, the window forwards only a DELTA of the section ids IT toggled (applied per-key
    // by the pad), never the full map. Reset populates it with every id (expand-all). Pad mode leaves it empty.
    var sectionCollapsedDelta = {}; // section id -> intended collapsed bool, for the keys the settings window changed

    // Canonical order MUST match the historical render order (rich file sections first, then the
    // flat/tree scopes) so the default layout is unchanged for anyone without saved settings.
    var DEFAULT_SECTION_ORDER = ['fileScopes', 'tables', 'otherFiles', 'locals',
        'routines', 'localProcedures', 'moduleData', 'globals', 'procedures'];
    var SECTION_LABELS = {
        fileScopes: 'File Schematic', tables: 'Declared Tables', otherFiles: 'Other Files',
        locals: 'Local Data', routines: 'Routines', localProcedures: 'Local Procedures',
        moduleData: 'Module Data', globals: 'Global Data', procedures: 'Procedures'
    };
    // Raw data count per section (independent of the active filter) — drives "hide empty sections".
    function sectionCount(id) {
        switch (id) {
            case 'fileScopes': return fileScopes.reduce(function (n, s) { return n + ((s.files && s.files.length) || 0); }, 0);
            case 'tables': return tables.length;
            case 'otherFiles': return otherFiles.length;
            case 'locals': return locals.length;
            case 'routines': return routines.length;
            case 'localProcedures': return localProcedures.length;
            case 'moduleData': return moduleData.length;
            case 'globals': return globals.length;
            case 'procedures': return procedures.length;
            default: return 0;
        }
    }
    // Effective order: the saved order (known ids only), then any canonical ids not yet present
    // (so new/future sections are never silently dropped from someone's saved layout).
    function effectiveOrder() {
        var seen = {}, order = [];
        (sectionOrder || []).forEach(function (id) {
            if (id === 'browseFiles') id = 'fileScopes';   // migrate: the live grouped File Schematic replaces the old flat browse section, IN PLACE
            if (SECTION_LABELS[id] && !seen[id]) { seen[id] = true; order.push(id); }
        });
        DEFAULT_SECTION_ORDER.forEach(function (id) { if (!seen[id]) { seen[id] = true; order.push(id); } });
        return order;
    }

    // Apply a persisted/pushed UI-state blob into the live variables (no render — callers decide). Shared by
    // restoreUiState (pad + settings window seed). The live push (applyLayout) applies only layout fields.
    function applyState(st) {
        if (!st) return;
        if (st.sectionCollapsed) sectionCollapsed = st.sectionCollapsed;
        if (st.localCollapsed) localCollapsed = st.localCollapsed;
        if (st.relExpanded) relExpanded = st.relExpanded;
        if (st.detailOpen) detailOpen = st.detailOpen;
        if (typeof st.dark === 'boolean') darkMode = st.dark;
        if (typeof st.fontScale === 'number') fontScale = st.fontScale;
        // Section customization (absent in older saved blobs → safe defaults).
        if (Array.isArray(st.sectionOrder)) sectionOrder = st.sectionOrder;
        if (st.sectionHidden) sectionHidden = st.sectionHidden;
        if (typeof st.hideEmptySections === 'boolean') hideEmptySections = st.hideEmptySections;
    }

    // ---- Settings panel logic ----
    // In settings mode there is no pad list to render — just refresh the cards and persist (which posts the
    // new state to the host, which pushes it live to the docked pad). In the pad itself, re-render live.
    function commitSettings() {
        renderSettingsPanel();
        if (SETTINGS_MODE) { flushSaveUiState(); }   // immediate → survives a fast close/reopen
        else { render(); scheduleSaveUiState(); }
    }
    function ensureOrder() { if (!sectionOrder.length) sectionOrder = effectiveOrder(); }

    function moveSection(id, dir) {   // swap with the nearest VISIBLE neighbor (skip hidden ones)
        ensureOrder();
        var i = sectionOrder.indexOf(id); if (i < 0) return;
        var j = i + dir;
        while (j >= 0 && j < sectionOrder.length && sectionHidden[sectionOrder[j]]) j += dir;
        if (j < 0 || j >= sectionOrder.length) return;
        var tmp = sectionOrder[i]; sectionOrder[i] = sectionOrder[j]; sectionOrder[j] = tmp;
        commitSettings();
    }
    function reorderBefore(src, dest) {   // drag src so it lands just before dest
        ensureOrder();
        var i = sectionOrder.indexOf(src); if (i < 0) return;
        sectionOrder.splice(i, 1);
        var j = sectionOrder.indexOf(dest); if (j < 0) j = sectionOrder.length;
        sectionOrder.splice(j, 0, src);
        commitSettings();
    }
    function hideSection(id) { ensureOrder(); sectionHidden[id] = true; commitSettings(); }
    function showSection(id) {   // unhide → reappears at the bottom of the visible list
        ensureOrder(); delete sectionHidden[id];
        var i = sectionOrder.indexOf(id); if (i >= 0) sectionOrder.splice(i, 1);
        sectionOrder.push(id); commitSettings();
    }
    function toggleSectionExpand(id) {
        sectionCollapsed[id] = !sectionCollapsed[id];
        sectionCollapsedDelta[id] = sectionCollapsed[id];   // forward only this key's change to the pad
        commitSettings();
    }
    function resetSections() {
        sectionOrder = DEFAULT_SECTION_ORDER.slice(); sectionHidden = {};
        sectionCollapsed = {}; hideEmptySections = true;
        // Reset = expand every section: forward an explicit false for each known id so the pad clears its folds.
        sectionCollapsedDelta = {};
        DEFAULT_SECTION_ORDER.forEach(function (id) { sectionCollapsedDelta[id] = false; });
        commitSettings();
    }

    var _dragId = null;
    function buildSettingsCard(id, isHidden, isFirst, isLast) {
        var card = document.createElement('div');
        card.className = 'scard';
        if (isHidden) {
            var lblH = document.createElement('span'); lblH.className = 'slabel';
            lblH.textContent = SECTION_LABELS[id] + '  (' + sectionCount(id) + ')';
            card.appendChild(lblH);
            var show = document.createElement('span'); show.className = 'sbtn';
            show.textContent = 'Show'; show.title = 'Show this section again';
            show.addEventListener('click', function () { showSection(id); });
            card.appendChild(show);
            return card;
        }
        card.draggable = true;
        card.addEventListener('dragstart', function (e) {
            _dragId = id; try { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); } catch (ex) {}
        });
        card.addEventListener('dragover', function (e) { e.preventDefault(); try { e.dataTransfer.dropEffect = 'move'; } catch (ex) {} card.classList.add('drop-target'); });
        card.addEventListener('dragleave', function () { card.classList.remove('drop-target'); });
        card.addEventListener('drop', function (e) {
            e.preventDefault(); card.classList.remove('drop-target');
            if (_dragId && _dragId !== id) reorderBefore(_dragId, id);
            _dragId = null;
        });

        var handle = document.createElement('span'); handle.className = 'handle'; handle.textContent = '⠿'; handle.title = 'Drag to reorder';
        card.appendChild(handle);
        var lbl = document.createElement('span'); lbl.className = 'slabel'; lbl.textContent = SECTION_LABELS[id];
        card.appendChild(lbl);

        var up = document.createElement('span'); up.className = 'sbtn'; up.textContent = '▲'; up.title = 'Move up';
        if (isFirst) up.setAttribute('disabled', ''); else up.addEventListener('click', function () { moveSection(id, -1); });
        card.appendChild(up);
        var dn = document.createElement('span'); dn.className = 'sbtn'; dn.textContent = '▼'; dn.title = 'Move down';
        if (isLast) dn.setAttribute('disabled', ''); else dn.addEventListener('click', function () { moveSection(id, 1); });
        card.appendChild(dn);

        var exp = document.createElement('span'); exp.className = 'sbtn';
        var isCollapsed = !!sectionCollapsed[id];
        exp.textContent = isCollapsed ? '▸' : '▾';
        exp.title = isCollapsed ? 'Starts collapsed — click to start expanded' : 'Starts expanded — click to start collapsed';
        exp.addEventListener('click', function () { toggleSectionExpand(id); });
        card.appendChild(exp);

        var hide = document.createElement('span'); hide.className = 'sbtn'; hide.textContent = 'Hide'; hide.title = 'Hide this section';
        hide.addEventListener('click', function () { hideSection(id); });
        card.appendChild(hide);
        return card;
    }
    function renderSettingsPanel() {
        var vis = document.getElementById('visibleZone');
        var hid = document.getElementById('hiddenZone');
        if (!vis || !hid) return;
        vis.innerHTML = ''; hid.innerHTML = '';
        var order = effectiveOrder();
        var visIds = order.filter(function (id) { return !sectionHidden[id]; });
        visIds.forEach(function (id, i) { vis.appendChild(buildSettingsCard(id, false, i === 0, i === visIds.length - 1)); });
        var hidIds = order.filter(function (id) { return sectionHidden[id]; });
        if (!hidIds.length) {
            var none = document.createElement('div'); none.className = 'hint'; none.textContent = 'No hidden sections.'; hid.appendChild(none);
        } else {
            hidIds.forEach(function (id) { hid.appendChild(buildSettingsCard(id, true)); });
        }
        var chk = document.getElementById('hideEmptyChk'); if (chk) chk.checked = !!hideEmptySections;
    }
    function openSettings() { ensureOrder(); renderSettingsPanel(); document.getElementById('settingsOverlay').style.display = 'block'; }
    function closeSettings() { document.getElementById('settingsOverlay').style.display = 'none'; }

    // LSP SymbolKind -> short label
    function kindLabel(k) {
        switch (k) {
            case 5: return 'class'; case 6: return 'method'; case 7: return 'property';
            case 8: return 'field'; case 10: return 'enum'; case 12: return 'function';
            case 13: return 'var'; case 14: return 'const'; case 18: return 'array';
            case 19: return 'group'; case 22: return 'member'; case 23: return 'struct';
            default: return '';
        }
    }

    function postToHost(obj) {
        try { window.chrome.webview.postMessage(JSON.stringify(obj)); } catch (e) {}
    }

    // Update the version/solution banner under the title. Source of truth = the host (setVersionInfo and the
    // setExplorerData payload both call this), so the banner self-corrects once the solution is loaded.
    function setVerBanner(versionTag, solutionTag) {
        var vt = document.getElementById('verText');
        if (!vt) return;
        var sol = (solutionTag && solutionTag !== 'NoSolution') ? solutionTag : 'no solution';
        vt.textContent = (versionTag || '?') + '   ·   ' + sol;
    }

    function insert(name) { postToHost({ action: 'insert', name: name }); }

    // ---- Tab switching (Data | Files). Called from the inline onclick handlers, so it must be global.
    // Toggles .active on the matching .tab + .tabpanel. On EVERY switch to Files, ask the host for fresh data:
    // the first request can land before the solution finished loading (empty), so re-requesting on each activation
    // guarantees the recents show once a solution is open. The host classifier caches by mtime, so re-posts are cheap.
    function pick(which) {
        var tabs = document.querySelectorAll('.tab-bar .tab');
        for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === which);
        var panels = document.querySelectorAll('.tabpanel');
        for (var j = 0; j < panels.length; j++) panels[j].classList.remove('active');
        var p = document.getElementById('panel-' + which);
        if (p) p.classList.add('active');
        // Tell the host which tab is active so it can switch external-drop ownership: on Files the host handles
        // OS file drops (to recover real paths WebView2 hides from JS); on Data the page keeps its text-drop.
        postToHost({ action: 'tabChanged', tab: which });
        if (which === 'files') postToHost({ action: 'requestExplorerData' });
    }

    // Repaint the multi-select highlight from selSet WITHOUT a full render() — keeps row elements alive so a
    // double-click (insert) still fires after the selecting single-clicks. Valid until the next render()
    // (which rebuilds selOrder with fresh element refs and re-applies the class during construction).
    function applySel() {
        for (var i = 0; i < selOrder.length; i++) {
            var e = selOrder[i];
            if (e.el) e.el.classList.toggle('multisel', selSet[e.key] !== undefined);
        }
        updateCounts();
    }

    // A draggable + multi-selectable list row carrying its compilable (prefixed) insert text as text/plain.
    // The drop lands in the Modern Embeditor's Monaco webview (a SEPARATE WebView2); our installDropInsert
    // inserts it at the drop point and the readOnly guard gates it to editable slots. Windows-standard select:
    //   - Plain click  → select just this row, clearing others, and set the Shift anchor.
    //   - Ctrl/Cmd-click → toggle this row, keeping the rest.
    //   - Shift-click  → select the range from the anchor to this row (in list order).
    //   - Dragging a SELECTED row drops the WHOLE selection as a block (one item per line, list order);
    //     dragging an UNSELECTED row drops just this row.
    // pass plainSelect=false for rows that own a competing plain-click action (Procedures: select-for-Open).
    // dragMeta (optional): {table, column} for a dictionary-COLUMN row, so a drop on a Local/Global section can
    // do a lossless field copy. Carried alongside text/plain — the drop handler prefers it (text/plain for a
    // column is the compilable reference like "PRE:Name", which is NOT a parseable declaration).
    function makeDraggable(row, text, plainSelect, dragMeta) {
        if (!text) return;
        if (plainSelect === undefined) plainSelect = true;
        // Stable selection key: text + per-render occurrence index (handles duplicate names across tables).
        var occ = (_selOcc[text] || 0); _selOcc[text] = occ + 1;
        var key = text + '#' + occ;
        selOrder.push({ key: key, text: text, el: row, meta: dragMeta || null });
        if (selSet[key] !== undefined) row.classList.add('multisel');

        row.addEventListener('mousedown', function (e) {
            if (e.shiftKey || e.ctrlKey || e.metaKey) { e.preventDefault(); e.stopPropagation(); }
        }, true);
        row.addEventListener('click', function (e) {
            // Clicks on the chevron / "+" detail / action / line-number children do their own thing — never select.
            var t = e.target;
            if (t && t !== row && (t.classList.contains('twisty') || t.classList.contains('detail-tog')
                || t.classList.contains('act') || t.classList.contains('lineno'))) return;
            if (e.shiftKey) {
                e.preventDefault(); e.stopPropagation();
                selectRangeTo(key); applySel();
            } else if (e.ctrlKey || e.metaKey) {
                e.preventDefault(); e.stopPropagation();
                if (selSet[key] !== undefined) delete selSet[key]; else selSet[key] = text;
                lastSel = key; applySel();
            } else if (plainSelect) {
                selSet = {}; selSet[key] = text; lastSel = key; applySel();
            }
        }, true);

        row.draggable = true;
        row.addEventListener('dragstart', function (e) {
            var payload = text;
            if (selSet[key] !== undefined) {
                var parts = [];
                for (var i = 0; i < selOrder.length; i++)
                    if (selSet[selOrder[i].key] !== undefined) parts.push(selOrder[i].text);
                if (parts.length) payload = parts.join('\n');
            }
            try { e.dataTransfer.setData('text/plain', payload); e.dataTransfer.effectAllowed = 'copy'; }
            catch (ex) {}
            // Column rows also carry structured {table,column} (this row, or every selected column row) so a drop
            // on a Local/Global section copies the real dictionary field(s) rather than parsing "PRE:Name" as text.
            try {
                var metas = [];
                if (selSet[key] !== undefined) {
                    for (var j = 0; j < selOrder.length; j++)
                        if (selSet[selOrder[j].key] !== undefined && selOrder[j].meta) metas.push(selOrder[j].meta);
                } else if (dragMeta) { metas.push(dragMeta); }
                if (metas.length) e.dataTransfer.setData('application/x-ca-column', JSON.stringify({ n: DRAG_NONCE, cols: metas }));
            } catch (ex2) {}
        });
        row.addEventListener('dragend', function (e) {
            try { if (e.dataTransfer && e.dataTransfer.dropEffect && e.dataTransfer.dropEffect !== 'none') { selSet = {}; applySel(); } }
            catch (ex) {}
        });
    }

    // Shift-click: select every row between the anchor (lastSel) and the clicked key inclusive, in current
    // render order. With no anchor yet, behaves like a single select.
    function selectRangeTo(key) {
        var idx = -1, anchor = -1, i;
        for (i = 0; i < selOrder.length; i++) {
            if (selOrder[i].key === key) idx = i;
            if (selOrder[i].key === lastSel) anchor = i;
        }
        if (idx < 0) return;
        selSet = {};   // Windows-standard: Shift-click replaces the selection with the anchor→target range.
        if (anchor < 0) { selSet[key] = selOrder[idx].text; lastSel = key; return; }
        var lo = Math.min(idx, anchor), hi = Math.max(idx, anchor);
        for (i = lo; i <= hi; i++) selSet[selOrder[i].key] = selOrder[i].text;
    }

    // ---- UI polish: dark theme, font scale, and the bar counts readout ----
    function applyTheme() {
        document.body.classList.toggle('dark', !!darkMode);
        var b = document.getElementById('themeBtn');
        if (b) { b.textContent = darkMode ? '☀' : '🌙'; b.title = darkMode ? 'Switch to light mode' : 'Switch to dark mode'; }
    }
    function applyFont() {
        if (fontScale < 0.7) fontScale = 0.7;
        if (fontScale > 1.8) fontScale = 1.8;
        document.body.style.fontSize = (12 * fontScale).toFixed(2) + 'px';
    }
    function updateCounts() {
        var c = document.getElementById('counts'); if (!c) return;
        var f = (document.getElementById('filter').value || '').trim();
        var selN = Object.keys(selSet).length;
        var parts = [];
        // #title is now the fixed pad name ("Explorer"); the active procedure/file context rides in #counts.
        if (procTitle) parts.push(procTitle);
        if (selN) parts.push(selN + ' selected');
        if (f) parts.push(selOrder.length + ' / ' + _totalShown);
        c.textContent = parts.join('  ·  ');
    }

    // Persist the collapse/expand UI state (debounced) so it survives the embeditor closing/reopening. The
    // host stores it as an opaque blob; the font zoom is persisted separately (WebView2 ZoomFactor).
    function postUiStateNow() {
        try {
            postToHost({
                action: 'saveUiState',
                state: JSON.stringify({
                    sectionCollapsed: sectionCollapsed, localCollapsed: localCollapsed,
                    relExpanded: relExpanded, detailOpen: detailOpen,
                    dark: darkMode, fontScale: fontScale,
                    sectionOrder: sectionOrder, sectionHidden: sectionHidden,
                    hideEmptySections: hideEmptySections,
                    sectionCollapsedDelta: sectionCollapsedDelta
                })
            });
        } catch (e) {}
    }
    var _saveTimer = null;
    function scheduleSaveUiState() {
        if (_saveTimer) clearTimeout(_saveTimer);
        _saveTimer = setTimeout(function () { _saveTimer = null; postUiStateNow(); }, 400);
    }
    // Settings mode posts immediately (no debounce) so a fast close/reopen can't drop the last edit before it
    // reaches the pad (and through it, disk). DRAIN the section-collapse delta once forwarded: it represents
    // "changes since the last push", so leaving it would re-push already-delivered keys on every later action
    // and re-clobber whole-section folds the user made in the pad after the window's earlier toggle.
    function flushSaveUiState() {
        if (_saveTimer) { clearTimeout(_saveTimer); _saveTimer = null; }
        postUiStateNow();
        if (SETTINGS_MODE) sectionCollapsedDelta = {};
    }

    function makeRow(cls, kindText, nameText, typeText, title, insertText, action) {
        var row = document.createElement('div');
        row.className = 'row' + (cls ? ' ' + cls : '');
        row.title = title || nameText;
        if (action) {
            var a = document.createElement('span');
            a.className = 'act'; a.textContent = action.icon; a.title = action.title;
            a.addEventListener('click', function (e) {
                e.stopPropagation();
                postToHost({ action: action.type, name: nameText });
            });
            row.appendChild(a);
        }
        if (kindText !== null) { var k = document.createElement('span'); k.className = 'kind'; k.textContent = kindText; row.appendChild(k); }
        var n = document.createElement('span'); n.className = 'name'; n.textContent = nameText; row.appendChild(n);
        if (typeText) { var t = document.createElement('span'); t.className = 'type'; t.textContent = typeText; row.appendChild(t); }
        if (insertText) { row.addEventListener('dblclick', function () { insert(insertText); }); makeDraggable(row, insertText); }
        return row;
    }

    function render() {
        // Reset the per-render multi-select trackers BEFORE any makeDraggable() call rebuilds the rows.
        selOrder = []; _selOcc = {};
        // render() rebuilds the section DOM, so the old header's mouseleave never fires — clear hoverScope to
        // avoid a stale value (a later Ctrl+V would otherwise target a scope no longer under the cursor). It
        // re-arms on the next mouseenter once the pointer moves over a Local/Global header.
        hoverScope = null;
        var f = (document.getElementById('filter').value || '').trim().toLowerCase();
        var match = function (s) { return !f || (s && s.toLowerCase().indexOf(f) >= 0); };
        // [11] Smarter filter: match against ANY of several text fields (descriptions / prompts / headers /
        // key types), not just names. Returns true when there is no filter, exactly like match().
        var matchAny = function () {
            if (!f) return true;
            for (var i = 0; i < arguments.length; i++) {
                var s = arguments[i];
                if (s && String(s).toLowerCase().indexOf(f) >= 0) return true;
            }
            return false;
        };
        var list = document.getElementById('list');
        list.innerHTML = '';

        // allCtl (optional): {kind:'tree'|'file', items:[...]} — when present (and the section is open), a
        // Collapse-All / Expand-All pair is shown at the far right that folds/unfolds everything in the section.
        // extraBtns (optional): [{label, title, onClick}] — custom header buttons on the far right (e.g.
        // Procedures' "Open"). Shown left of the Collapse/Expand-all pair when the section is open.
        function sectionHeader(key, label, count, allCtl, extraBtns, dropScope) {
            var open = !sectionCollapsed[key] || !!f; // force-open while filtering
            var sec = document.createElement('div');
            sec.className = 'section';
            var lbl = document.createElement('span');
            lbl.className = 'sec-label';
            lbl.style.cursor = 'pointer';
            lbl.textContent = (open ? '▾ ' : '▸ ') + label + '  (' + count + ')';
            lbl.addEventListener('click', function () { sectionCollapsed[key] = !sectionCollapsed[key]; render(); });
            sec.appendChild(lbl);
            // Local/Global headers are paste/drag-drop targets: drop Clarion declaration TEXT (from Monaco/another
            // app) → parse + create; drop in-pad COLUMN row(s) (application/x-ca-column) → lossless field copy.
            // Hovering also arms Ctrl+V for this scope (see the document keydown handler).
            if (dropScope) wireScopeDrop(sec, dropScope);
            if (open && (allCtl || (extraBtns && extraBtns.length))) {
                var ctl = document.createElement('span'); ctl.className = 'sec-ctl';
                (extraBtns || []).forEach(function (b) {
                    var btn = document.createElement('span'); btn.className = 'sec-btn';
                    btn.textContent = b.label; btn.title = b.title;
                    btn.addEventListener('click', function (e) { e.stopPropagation(); b.onClick(); });
                    ctl.appendChild(btn);
                });
                if (allCtl) {
                    var cAll = document.createElement('span'); cAll.className = 'sec-btn';
                    cAll.textContent = '⊟'; cAll.title = 'Collapse all';
                    cAll.addEventListener('click', function (e) { e.stopPropagation(); setAllInSection(key, allCtl, true); });
                    var eAll = document.createElement('span'); eAll.className = 'sec-btn';
                    eAll.textContent = '⊞'; eAll.title = 'Expand all';
                    eAll.addEventListener('click', function (e) { e.stopPropagation(); setAllInSection(key, allCtl, false); });
                    ctl.appendChild(cAll); ctl.appendChild(eAll);
                }
                sec.appendChild(ctl);
            }
            list.appendChild(sec);
            return open;
        }

        // "＋ Add" header button for the Local/Global Data sections — asks the host to drive Clarion's own
        // add-variable form for that scope (current procedure for Local). Returns null for other sections.
        function addVarBtns(key) {
            if (key !== 'locals' && key !== 'globals') return null;
            var scope = (key === 'locals') ? 'local' : 'global';
            return [{
                label: '＋ Add',
                title: 'Add a ' + scope + ' variable (opens Clarion’s field form)',
                onClick: function () { postToHost({ action: 'addVariable', scope: scope, procedure: renderedProcedure }); }
            }, {
                // 📋 Paste: the host reads the Windows clipboard and parses Clarion declaration text (e.g.
                // "Cust:Name STRING(30)") into new variable(s) — no inline text, so the host-clipboard path runs.
                label: '📋 Paste',
                title: 'Paste ' + scope + ' variable definition(s) from the clipboard (Clarion declaration text)',
                onClick: function () { postToHost({ action: 'pasteVariables', scope: scope, procedure: renderedProcedure }); }
            }];
        }

        // Map a section key to its variable scope (for paste/drop targets); null for non-variable sections.
        function scopeForKey(key) { return key === 'locals' ? 'local' : (key === 'globals' ? 'global' : null); }

        // DataTransfer.types can be a DOMStringList (not an Array) — membership test without Array.indexOf.
        function hasType(types, t) {
            if (!types) return false;
            for (var i = 0; i < types.length; i++) if (types[i] === t) return true;
            return false;
        }

        // Make a Local/Global section header a paste/drag-drop target for variable definitions, and track hover
        // so Ctrl+V knows which scope to paste into. A COLUMN drag (application/x-ca-column) → lossless field copy;
        // any other text/plain → declaration text the host parses. Column data is preferred over text (a column's
        // text/plain is its compilable reference, not a parseable declaration).
        function wireScopeDrop(sec, scope) {
            sec.addEventListener('mouseenter', function () { hoverScope = scope; });
            sec.addEventListener('mouseleave', function () { if (hoverScope === scope) hoverScope = null; });
            sec.addEventListener('dragover', function (e) {
                var types = e.dataTransfer ? e.dataTransfer.types : null;
                if (!hasType(types, 'application/x-ca-column') && !hasType(types, 'text/plain')) return;
                e.preventDefault();
                try { e.dataTransfer.dropEffect = 'copy'; } catch (ex) {}
                sec.classList.add('drop-target');
            });
            sec.addEventListener('dragleave', function () { sec.classList.remove('drop-target'); });
            sec.addEventListener('drop', function (e) {
                e.preventDefault();
                sec.classList.remove('drop-target');
                var colRaw = '';
                try { colRaw = e.dataTransfer.getData('application/x-ca-column'); } catch (ex) {}
                if (colRaw) {
                    // In-pad column drag only: the payload must carry this page's session nonce. A foreign drag
                    // source can set the MIME but not the nonce, so it's dropped (never parsed as declaration text).
                    // Reject an oversized custom-MIME payload BEFORE JSON.parse so a hostile external drag can't
                    // force a multi-megabyte parse in the renderer (a real in-pad column payload is tiny).
                    if (colRaw.length > 256 * 1024) return;
                    var parsed = null;
                    try { parsed = JSON.parse(colRaw); } catch (ex3) {}
                    if (parsed && parsed.n === DRAG_NONCE && parsed.cols && parsed.cols.length)
                        postToHost({ action: 'copyColumns', scope: scope, cols: JSON.stringify(parsed.cols), procedure: renderedProcedure });
                    return;
                }
                var text = '';
                try { text = e.dataTransfer.getData('text/plain'); } catch (ex2) {}
                if (text) {
                    // Reject an oversized drop HERE, before it crosses to the host (mirrors the host's 256KB paste
                    // cap) so a multi-megabyte external text drop can't force a big message allocation + UI-thread
                    // scan on the host side. A real variable-declaration paste is tiny.
                    if (text.length > 256 * 1024) return;
                    text = text.replace(/\r\n?/g, '\n');   // normalize so the host JSON reader round-trips multi-line cleanly
                    postToHost({ action: 'pasteVariables', scope: scope, text: text, procedure: renderedProcedure });
                }
            });
        }

        // Collapse-All / Expand-All for one section. `collapse` true folds everything; false unfolds it.
        // Keys mirror exactly what the renderers use (localCollapsed default-open, relExpanded default-closed).
        function setAllInSection(key, ctl, collapse) {
            var setOpenState = function (map, k, on) { if (on) map[k] = true; else delete map[k]; };
            if (ctl.kind === 'tree') {
                (function walkTree(arr, parentKey) {
                    (arr || []).forEach(function (it) {
                        var kids = it.children || [];
                        if (kids.length) {
                            var nkey = parentKey + '/' + (it.name || '');
                            setOpenState(localCollapsed, nkey, collapse);
                            walkTree(kids, nkey);
                        }
                    });
                })(ctl.items, key);
            } else { // 'file'
                (ctl.items || []).forEach(function (ff) {
                    var fkey = key + '/' + ff.name;
                    setOpenState(localCollapsed, fkey, collapse);            // table header (default open)
                    setOpenState(localCollapsed, fkey + '/keys', collapse);  // Keys sub-folder
                    setOpenState(localCollapsed, fkey + '/cols', collapse);  // Columns sub-folder
                    (function walkCols(cols, ck) {
                        (cols || []).forEach(function (c) {
                            if ((c.children || []).length) {
                                var nk = ck + '/' + c.name;
                                setOpenState(localCollapsed, nk, collapse);
                                walkCols(c.children, nk);
                            }
                        });
                    })(ff.columns, fkey + '/cols');
                    // Relations folder is default-CLOSED, so expand => set true, collapse => clear.
                    if ((ff.relations || []).length) {
                        if (collapse) delete relExpanded[fkey + '/rels'];
                        else relExpanded[fkey + '/rels'] = true;
                    }
                });
            }
            render();
        }

        // ----- Rich dictionary-table renderer, shared by the Tables (used by this procedure) and Other
        //   Files ([FILES][OTHERS]) sections so both render identically off the LIVE dictionary schema.
        //   Minimum-first: prefix shown once at the file header, names listed UNPREFIXED, double-click
        //   pastes the prefixed (compilable) name. A "+" on each table/key/field expands a detail panel
        //   (attributes/description/components). Keys + Columns are collapsible sub-folders. The `key`
        //   param namespaces collapse/detail state so the two sections don't collide. -----
        function richFileSection(key, label, items) {
            var esc = function (s) {
                return (s == null ? '' : String(s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            };
            // [11] Columns match on name OR description/prompt/header (recursing into GROUP children).
            var colMatch = function (c) {
                return matchAny(c.name, c.description, c.prompt, c.header) || (c.children || []).some(colMatch);
            };
            // [11] Keys match on name/description/type OR any of their component columns.
            var keyMatch = function (k) {
                return matchAny(k.name, k.description, k.keyType) || (k.components || []).some(colMatch);
            };
            var fileMatch = function (ff) {
                return matchAny(ff.name, ff.description) || (ff.columns || []).some(colMatch)
                    || (ff.keys || []).some(keyMatch);
            };
            if (!items.filter(fileMatch).length) return;
            if (!sectionHeader(key, label, items.length, { kind: 'file', items: items })) return;

            // All per-file rows are appended to `host`, which is `list` for top-level files and a margin-left
            // wrapper for related files (relation-tree depth > 0) so Publishers→Titles→Sales staircase exactly
            // like Clarion's native pad. Reassigned per file in the items.forEach below; the gutterRow/detailPanel
            // closures read it at call time.
            var host = list;

            // Fixed left gutter so twisty + "+" align across rows. `hasTwisty`/`open` drive the twisty glyph;
            // `dkey` (when set) wires the "+" detail toggle. Returns the created row (already appended).
            function gutterRow(cls, name, type, insertText, padPx, hasTwisty, open, twistyToggle, dkey) {
                var row = makeRow(cls, null, name, type || '', name, insertText);
                row.style.paddingLeft = padPx + 'px';
                // "+" detail toggle (left of name, per design); empty slot keeps alignment when no detail.
                var plus = document.createElement('span');
                plus.className = 'detail-tog';
                if (dkey) {
                    plus.textContent = detailOpen[dkey] ? '−' : '+';
                    plus.title = 'Show details';
                    plus.addEventListener('click', function (e) {
                        e.stopPropagation(); detailOpen[dkey] = !detailOpen[dkey]; render();
                    });
                }
                row.insertBefore(plus, row.firstChild);
                // structural twisty (far left)
                var tw = document.createElement('span');
                tw.className = 'twisty';
                tw.textContent = hasTwisty ? (open ? '▾' : '▸') : '';
                row.insertBefore(tw, row.firstChild);
                if (hasTwisty && twistyToggle) {
                    tw.style.cursor = 'pointer';   // chevron-only expand/collapse (row body is for selection)
                    tw.addEventListener('click', function (e) { e.stopPropagation(); twistyToggle(); });
                }
                host.appendChild(row);
                return row;
            }
            function detailPanel(padPx, html) {
                var d = document.createElement('div');
                d.className = 'detail'; d.style.paddingLeft = padPx + 'px';
                d.innerHTML = html;
                host.appendChild(d);
            }

            items.forEach(function (ff) {
                if (!fileMatch(ff)) return;
                // Indent related files by their relation-tree depth (primary = 0). A margin-left wrapper shifts the
                // whole table block (header + Keys/Columns/Relations) together, preserving each table's internal
                // column alignment (every table has its own .fgrid subgrid).
                var fdepth = ff.depth || 0;
                host = list;
                if (fdepth > 0) {
                    host = document.createElement('div');
                    host.style.marginLeft = (fdepth * 16) + 'px';
                    list.appendChild(host);
                }
                var fkey = key + '/' + ff.name;
                var fOpen = !localCollapsed[fkey] || !!f;
                var fDet = !!(ff.attributes || ff.description);
                var hdr = gutterRow('table-hdr', ff.name, '', ff.name, 10, true, fOpen,
                    function () { localCollapsed[fkey] = !localCollapsed[fkey]; render(); },
                    fDet ? ('d:' + fkey) : null);
                if (ff.prefix) {
                    var pp = document.createElement('span'); pp.className = 'pre';
                    pp.textContent = 'PRE(' + ff.prefix + ')'; hdr.appendChild(pp);
                }
                if (ff.browseKey) {
                    // File-Browsing List Box: show the key the primary file is browsed on (e.g. — AUT:AuSS_Key).
                    var bk = document.createElement('span'); bk.className = 'pre';
                    bk.textContent = '— ' + ff.browseKey; hdr.appendChild(bk);
                }
                if (fDet && detailOpen['d:' + fkey]) {
                    var attr = ff.attributes ? '<span class="attr">' + esc(ff.attributes) + '</span>' : '';
                    var cmt = ff.description ? '<span class="cmt">  ! ' + esc(ff.description) + '</span>' : '';
                    detailPanel(50, attr + cmt);
                }
                if (!fOpen) return;

                // Keys sub-folder
                var keys = (ff.keys || []).filter(function (k) { return keyMatch(k); });
                if (keys.length) {
                    var kkey = fkey + '/keys';
                    var kOpen = !localCollapsed[kkey] || !!f;
                    gutterRow('table-hdr', 'Keys', '', null, 28, true, kOpen,
                        function () { localCollapsed[kkey] = !localCollapsed[kkey]; render(); }, null);
                    if (kOpen) keys.forEach(function (k) {
                        if (!keyMatch(k)) return;
                        var ins = ff.prefix ? ff.prefix + ':' + k.name : k.name;
                        var kdkey = 'd:' + kkey + '/' + k.name;
                        var hasKDet = !!((k.components && k.components.length) || k.description || k.keyType);
                        var kr = gutterRow('col-row', k.name, '', ins, 44, false, false, null,
                            hasKDet ? kdkey : null);
                        if (k.primary) { var pb = document.createElement('span'); pb.className = 'badge pk'; pb.textContent = 'PK'; kr.appendChild(pb); }
                        if (k.unique) { var ub = document.createElement('span'); ub.className = 'badge uniq'; ub.textContent = 'UNIQUE'; kr.appendChild(ub); }
                        if (hasKDet && detailOpen[kdkey]) {
                            // Attribute summary line.
                            var attrs = (k.keyType || 'KEY')
                                + (k.primary ? ' · Primary' : '') + (k.unique ? ' · Unique' : '')
                                + (k.caseSensitive ? ' · Case Sensitive' : '');
                            var head = '<span class="attr">' + attrs + '</span>';
                            if (k.description) head += '<span class="cmt">  ! ' + esc(k.description) + '</span>';
                            detailPanel(84, head);
                            // Each component field on its own readable line (name / type / picture).
                            (k.components || []).forEach(function (comp) {
                                var cins = ff.prefix ? ff.prefix + ':' + comp.name : comp.name;
                                var crow = makeRow('comp-row', null, comp.name, comp.type || '',
                                    comp.name + (comp.type ? '  ' + comp.type : ''), cins);
                                crow.style.paddingLeft = '92px';
                                if (comp.picture) {
                                    var cp = document.createElement('span');
                                    cp.className = 'picture'; cp.textContent = comp.picture; crow.appendChild(cp);
                                }
                                host.appendChild(crow);
                            });
                        }
                    });
                }

                // Columns sub-folder — LEFT-aligned columns via a per-table subgrid (.fgrid). The twisty + "+"
                // gutter lives inside the name cell so the type/picture columns stay aligned across rows and
                // nesting depths; detail panels are appended into the grid and span all tracks.
                var cols = ff.columns || [];
                if (cols.length) {
                    var ckey = fkey + '/cols';
                    var cOpen = !localCollapsed[ckey] || !!f;
                    gutterRow('table-hdr', 'Columns', '', null, 28, true, cOpen,
                        function () { localCollapsed[ckey] = !localCollapsed[ckey]; render(); }, null);
                    if (cOpen) {
                        var cgrid = document.createElement('div');
                        cgrid.className = 'fgrid';
                        host.appendChild(cgrid);
                        var walk = function (arr, depth) {
                            arr.forEach(function (c) {
                                if (!colMatch(c)) return;
                                var kids = c.children || [];
                                var hasKids = kids.length > 0;
                                var nkey = ckey + '/' + c.name;
                                var open = hasKids && (!localCollapsed[nkey] || !!f);
                                var ins = ff.prefix ? ff.prefix + ':' + c.name : c.name;
                                var cdkey = 'd:' + nkey;
                                var hasCDet = !!(c.description || c.derivedFrom);

                                var row = document.createElement('div');
                                row.className = 'row frow col-row';
                                row.title = c.name + (c.type ? '  ' + c.type : '') + (c.picture ? '  ' + c.picture : '');

                                // Column 1: gutter (twisty + "+") + name, indented for nesting.
                                var gcell = document.createElement('div');
                                gcell.className = 'gcell';
                                gcell.style.paddingLeft = (depth * 16) + 'px';
                                var tw = document.createElement('span'); tw.className = 'twisty';
                                tw.textContent = hasKids ? (open ? '▾' : '▸') : '';
                                gcell.appendChild(tw);
                                var plus = document.createElement('span'); plus.className = 'detail-tog';
                                if (hasCDet) {
                                    plus.textContent = detailOpen[cdkey] ? '−' : '+';
                                    plus.title = 'Show details';
                                    plus.addEventListener('click', function (e) {
                                        e.stopPropagation(); detailOpen[cdkey] = !detailOpen[cdkey]; render();
                                    });
                                }
                                gcell.appendChild(plus);
                                var nm = document.createElement('span'); nm.className = 'name'; nm.textContent = c.name;
                                gcell.appendChild(nm);
                                row.appendChild(gcell);

                                // Column 2: type. Column 3: picture (empty cell keeps the 3-track grid).
                                var ty = document.createElement('div'); ty.className = 'type'; ty.textContent = c.type || '';
