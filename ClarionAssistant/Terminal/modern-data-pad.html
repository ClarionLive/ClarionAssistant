                                row.appendChild(ty);
                                var pc = document.createElement('div'); pc.className = 'picture'; pc.textContent = c.picture || '';
                                row.appendChild(pc);

                                row.addEventListener('dblclick', function () { insert(ins); });
                                makeDraggable(row, ins, true, { table: ff.name, column: c.name });
                                if (hasKids) {
                                    tw.style.cursor = 'pointer';   // chevron-only expand/collapse
                                    tw.addEventListener('click', function (e) {
                                        e.stopPropagation(); localCollapsed[nkey] = !localCollapsed[nkey]; render();
                                    });
                                }
                                cgrid.appendChild(row);

                                if (hasCDet && detailOpen[cdkey]) {
                                    var dl = [];
                                    if (c.description) dl.push('<span class="cmt">! ' + esc(c.description) + '</span>');
                                    if (c.derivedFrom) dl.push('<span class="attr">derived from ' + esc(c.derivedFrom) + '</span>');
                                    var d = document.createElement('div');
                                    d.className = 'detail';
                                    d.style.paddingLeft = (40 + depth * 16) + 'px';
                                    d.innerHTML = dl.join('<br>');
                                    cgrid.appendChild(d); // spans all tracks via .fgrid .detail
                                }
                                if (open) walk(kids, depth + 1);
                            });
                        };
                        walk(cols, 0);
                    }
                }

                // Relations sub-folder — only when the table has relations; COLLAPSED BY DEFAULT (unlike
                // Keys/Columns). Expand → one row per related table (type shown dimmed); each row's "+"
                // opens a detail panel with the primary/foreign keys and the column mappings.
                var rels = (ff.relations || []).filter(function (r) { return match(r.name) || match(r.type); });
                if (rels.length) {
                    var rkey = fkey + '/rels';
                    var rOpen = !!relExpanded[rkey] || !!f;   // absent = collapsed
                    gutterRow('table-hdr', 'Relations', '', null, 28, true, rOpen,
                        function () { relExpanded[rkey] = !relExpanded[rkey]; render(); }, null);
                    if (rOpen) rels.forEach(function (r) {
                        var rdkey = 'd:' + rkey + '/' + r.name;
                        var hasRDet = !!(r.primaryKey || r.foreignKey || (r.mappings && r.mappings.length));
                        gutterRow('col-row', r.name, r.type || '', r.name, 44, false, false, null,
                            hasRDet ? rdkey : null);
                        if (hasRDet && detailOpen[rdkey]) {
                            var dl = [];
                            if (r.primaryKey) dl.push('<span class="attr">Primary Key: ' + esc(r.primaryKey) + '</span>');
                            if (r.foreignKey) dl.push('<span class="attr">Foreign Key: ' + esc(r.foreignKey) + '</span>');
                            if (dl.length) detailPanel(84, dl.join('<br>'));
                            (r.mappings || []).forEach(function (m) {
                                var mrow = makeRow('comp-row', null,
                                    (m.from || '?') + '  →  ' + (m.to || '?'), '', 'column mapping', null);
                                mrow.style.paddingLeft = '92px';
                                host.appendChild(mrow);
                            });
                        }
                    });
                }
            });
        }

        // ----- Flat scopes -----
        function flatSection(key, label, items, action) {
            var shown = items.filter(function (it) { return match(it.name); });
            if (!shown.length) return;
            if (!sectionHeader(key, label, shown.length)) return;
            shown.forEach(function (it) {
                list.appendChild(makeRow(null, null, it.name, it.type || '',
                    it.name + (it.type ? '  ' + it.type : ''), it.name, action));
            });
        }

        // Routines: name + an underlined, clickable LINE NUMBER (click -> go to its declaration). The line#
        // is the only click target (single-click on the row is inert — reserved for future drag & drop, and
        // avoids the "too-slow double-click loses your place" trap). Double-click pastes "DO <name>".
        function routineSection(items) {
            var shown = items.filter(function (it) { return match(it.name); });
            if (!shown.length) return;
            if (!sectionHeader('routines', 'Routines', shown.length)) return;
            shown.forEach(function (it) {
                var row = document.createElement('div');
                row.className = 'row';
                row.title = it.name + '  ROUTINE' + (it.line ? '  (line ' + it.line + ')' : '');
                row.style.paddingLeft = '46px';   // align name with the tree-section names (past chevron + "+" columns)
                var n = document.createElement('span'); n.className = 'name'; n.textContent = it.name; row.appendChild(n);
                if (it.line) {
                    var ln = document.createElement('span'); ln.className = 'lineno';
                    ln.textContent = it.line; ln.title = 'Go to line ' + it.line;
                    ln.addEventListener('click', function (e) { e.stopPropagation(); postToHost({ action: 'goto', name: it.name }); });
                    row.appendChild(ln);
                }
                row.addEventListener('dblclick', function () { insert('DO ' + it.name); });
                makeDraggable(row, 'DO ' + it.name);
                list.appendChild(row);
            });
        }

        // Local Procedures: the current procedure's LOCAL procedures, laid out exactly like Routines — name +
        // an underlined, clickable LINE NUMBER (click -> go to its declaration). Double-click pastes the
        // procedure name (a call). Reuses the 'goto' action; the host resolves the name to a routine OR a
        // local procedure.
        function localProcedureSection(items) {
            var shown = items.filter(function (it) { return match(it.name); });
            if (!shown.length) return;
            if (!sectionHeader('localProcedures', 'Local Procedures', shown.length)) return;
            shown.forEach(function (it) {
                var row = document.createElement('div');
                row.className = 'row';
                row.title = it.name + '  PROCEDURE' + (it.line ? '  (line ' + it.line + ')' : '');
                row.style.paddingLeft = '46px';
                var n = document.createElement('span'); n.className = 'name'; n.textContent = it.name; row.appendChild(n);
                if (it.line) {
                    var ln = document.createElement('span'); ln.className = 'lineno';
                    ln.textContent = it.line; ln.title = 'Go to line ' + it.line;
                    ln.addEventListener('click', function (e) { e.stopPropagation(); postToHost({ action: 'goto', name: it.name }); });
                    row.appendChild(ln);
                }
                row.addEventListener('dblclick', function () { insert(it.name); });
                makeDraggable(row, it.name);
                list.appendChild(row);
            });
        }

        // Procedures: name + parameter list. Single-click SELECTS a row (highlight); the header "Open" button
        // opens the selected procedure in a new CA Embeditor. Double-click pastes "<name>()" at the cursor.
        function procedureSection(items) {
            var shown = items.filter(function (it) { return match(it.name) || match(it.params); });
            if (!shown.length) return;
            var openSel = function () { if (selectedProc) postToHost({ action: 'open', name: selectedProc }); };
            if (!sectionHeader('procedures', 'Procedures', shown.length, null,
                [{ label: '↗ Open', title: 'Open selected Procedure in CA Embeditor', onClick: openSel }])) return;
            shown.forEach(function (it) {
                var row = document.createElement('div');
                row.className = 'row' + (selectedProc === it.name ? ' selected' : '');
                row.title = it.name + (it.params || '');
                row.style.paddingLeft = '46px';   // align name with the tree-section names (past chevron + "+" columns)
                var n = document.createElement('span'); n.className = 'name'; n.textContent = it.name; row.appendChild(n);
                if (it.params) { var p = document.createElement('span'); p.className = 'params'; p.textContent = it.params; row.appendChild(p); }
                row.addEventListener('click', function (e) { if (e.detail > 1 || e.ctrlKey || e.metaKey || e.shiftKey) return; selSet = {}; selectedProc = it.name; render(); });
                row.addEventListener('dblclick', function () { insert(it.name + '()'); });
                makeDraggable(row, it.name + '()', false);   // plain click = select-for-Open (handled above), not multi-select
                list.appendChild(row);
            });
        }

        // ----- Tree scope: declaration order, QUEUE/GROUP expandable to nested members, picture column.
        //       Used by both Local Data and Global Data (the .txa gives both the same shape). -----
        function treeSection(key, label, items) {
            // Scope for this section's per-row edit/delete actions (Local Data -> local, Global Data -> global).
            var rowScope = (key === 'locals') ? 'local' : 'global';
            var esc = function (s) {
                return (s == null ? '' : String(s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            };
            var anyMatch = function (arr) {
                return (arr || []).some(function (it) { return matchAny(it.name, it.prompt, it.header) || anyMatch(it.children); });
            };
            var countAll = function (arr) {
                return (arr || []).reduce(function (n, it) { return n + 1 + countAll(it.children); }, 0);
            };
            var shown = items.filter(function (it) { return matchAny(it.name, it.prompt, it.header) || anyMatch(it.children); });
            if (!shown.length) return;
            if (!sectionHeader(key, label, countAll(items), { kind: 'tree', items: items }, addVarBtns(key), scopeForKey(key))) return;

            // Per-section grid: subgrid rows share its max-content columns, so name/type/picture form real
            // LEFT-aligned columns (type starts past the longest name, picture past the longest type).
            var grid = document.createElement('div');
            grid.className = 'tgrid';
            list.appendChild(grid);

            var walk = function (arr, depth, parentKey) {
                arr.forEach(function (it) {
                    var kids = it.children || [];
                    if (!matchAny(it.name, it.prompt, it.header) && !anyMatch(kids)) return;
                    var nkey = parentKey + '/' + (it.name || '');
                    var hasKids = kids.length > 0;
                    var open = hasKids && (!localCollapsed[nkey] || !!f);
                    // [10] '+' detail for Local/Global rows — reveals prompt/header (the metadata not already
                    // shown in the type/picture columns), matching the Other Files/columns detail UX.
                    var dkey = 'd:' + nkey;
                    var hasDet = !!(it.prompt || it.header);
                    var tip = it.name + (it.type ? '  ' + it.type : '')
                        + (it.picture ? '  ' + it.picture : '')
                        + (it.prompt ? '\nPrompt: ' + it.prompt : '')
                        + (it.header ? '\nHeader: ' + it.header : '');

                    var row = document.createElement('div');
                    row.className = 'row trow';
                    row.title = tip;

                    // Column 1: name cell — twisty + name, indent absorbed here (keeps cols 2/3 aligned).
                    var namecell = document.createElement('div');
                    namecell.className = 'namecell';
                    namecell.style.paddingLeft = (depth * 16) + 'px';
                    var tw = document.createElement('span');
                    tw.className = 'twisty';
                    tw.textContent = hasKids ? (open ? '▾' : '▸') : '';
                    namecell.appendChild(tw);
                    var plus = document.createElement('span'); plus.className = 'detail-tog';
                    if (hasDet) {
                        plus.textContent = detailOpen[dkey] ? '−' : '+';
                        plus.title = 'Show details';
                        plus.addEventListener('click', function (e) {
                            e.stopPropagation(); detailOpen[dkey] = !detailOpen[dkey]; render();
                        });
                    }
                    namecell.appendChild(plus);
                    var nm = document.createElement('span');
                    nm.className = 'name'; nm.textContent = it.name;
                    namecell.appendChild(nm);

                    // Per-row edit/delete (hover-revealed). The host drives Clarion's own FieldForm / delete
                    // confirmation; for Local scope it validates against the on-screen procedure (renderedProcedure).
                    if (it.name) {
                        // Send the STRUCTURAL PATH (nkey minus the leading section key), e.g. "Member" or
                        // "Group/Member", so the host resolves nested GROUP/QUEUE members unambiguously by
                        // descending container-by-container (sibling names are unique) rather than by a flat
                        // name match (which could hit a same-named field in a different container).
                        var fieldPath = nkey.slice(key.length + 1);
                        var acts = document.createElement('span');
                        acts.className = 'acts';
                        var edBtn = document.createElement('span');
                        edBtn.className = 'act'; edBtn.textContent = '✎';
                        edBtn.title = 'Edit ' + it.name + ' (opens Clarion’s field form)';
                        edBtn.addEventListener('click', function (e) {
                            e.stopPropagation();
                            postToHost({ action: 'editVariable', scope: rowScope, path: fieldPath, procedure: renderedProcedure });
                        });
                        var delBtn = document.createElement('span');
                        delBtn.className = 'act'; delBtn.textContent = '🗑';
                        delBtn.title = 'Delete ' + it.name;
                        delBtn.addEventListener('click', function (e) {
                            e.stopPropagation();
                            postToHost({ action: 'deleteVariable', scope: rowScope, path: fieldPath, procedure: renderedProcedure });
                        });
                        acts.appendChild(edBtn); acts.appendChild(delBtn);
                        namecell.appendChild(acts);
                    }
                    row.appendChild(namecell);

                    // Column 2: type. Column 3: picture (empty cell keeps the 3-track grid consistent).
                    var ty = document.createElement('div');
                    ty.className = 'type'; ty.textContent = it.type || '';
                    row.appendChild(ty);
                    var pc = document.createElement('div');
                    pc.className = 'picture'; pc.textContent = it.picture || '';
                    row.appendChild(pc);

                    if (it.name) { row.addEventListener('dblclick', function () { insert(it.name); }); makeDraggable(row, it.name); }
                    if (hasKids) {
                        tw.style.cursor = 'pointer';   // chevron-only expand/collapse
                        tw.addEventListener('click', function (e) {
                            e.stopPropagation(); localCollapsed[nkey] = !localCollapsed[nkey]; render();
                        });
                    }
                    grid.appendChild(row);
                    if (hasDet && detailOpen[dkey]) {
                        var dd = [];
                        if (it.prompt) dd.push('<span class="attr">Prompt: ' + esc(it.prompt) + '</span>');
                        if (it.header) dd.push('<span class="attr">Header: ' + esc(it.header) + '</span>');
                        var dv = document.createElement('div');
                        dv.className = 'detail';
                        // Align the detail text under the NAME: row pad (10) + namecell indent (depth*16)
                        // + twisty (12) + gap (6) + "+" toggle (12) + gap (6) = 46 + depth*16.
                        dv.style.paddingLeft = (46 + depth * 16) + 'px';
                        dv.innerHTML = dd.join('<br>');
                        grid.appendChild(dv); // spans all tracks via .tgrid .detail
                    }
                    if (open) walk(kids, depth + 1, nkey);
                });
            };
            walk(items, 0, key);
        }

        // File Schematic: the per-template-instance file groups the native Data/Tables pad shows. Each scope
        // ("File-Browsing List Box", "Update Record on Disk", "Relation Tree Viewing List Box", ...) renders as
        // its OWN collapsible rich-file group via richFileSection, keyed by the stable instance name so the
        // collapse/detail state sticks across refreshes. A scope whose files are all filtered out self-hides
        // (richFileSection early-returns), matching every other rich file section.
        function fileScopesSection(scopes) {
            (scopes || []).forEach(function (sc, i) {
                var key = 'fileScope/' + (sc.instance || sc.label || i);
                richFileSection(key, sc.label || 'File Scope', sc.files || []);
            });
        }

        // Dispatch one section by id to its builder. Defined here (inside render) because the
        // builders above are render-scoped. Rich file sections, tree scopes, and flat scopes all
        // already early-return when the active filter hides every item.
        function buildSection(id) {
            switch (id) {
                case 'fileScopes': fileScopesSection(fileScopes); break;
                case 'tables': richFileSection('tables', 'Declared Tables', tables); break;
                case 'otherFiles': richFileSection('otherFiles', 'Other Files', otherFiles); break;
                case 'locals': treeSection('locals', 'Local Data', locals); break;
                case 'routines': routineSection(routines); break;
                case 'localProcedures': localProcedureSection(localProcedures); break;
                case 'moduleData': flatSection('moduleData', 'Module Data', moduleData); break;
                case 'globals': treeSection('globals', 'Global Data', globals); break;
                case 'procedures': procedureSection(procedures); break;
            }
        }

        // Render sections in the user's customized order, skipping hidden ones. A section with no
        // DATA is omitted while filtering or when "Hide empty sections" is on; otherwise it shows a
        // "(0)" header so the developer can still see (and reorder/hide) it.
        effectiveOrder().forEach(function (id) {
            if (sectionHidden[id]) return;
            if (sectionCount(id) === 0) {
                if (hideEmptySections || f) return;
                sectionHeader(id, SECTION_LABELS[id], 0, null, addVarBtns(id), scopeForKey(id));
                return;
            }
            buildSection(id);
        });

        if (!list.childNodes.length) {
            list.innerHTML = '<div class="empty">No data. Open a procedure in the CA Embeditor and Refresh. (Declared Tables come from the generated &lt;app&gt;.clw with live-dictionary schema; Other Files from the .txa; Local/Global Data from the app .txa.)</div>';
        }
        if (!f) _totalShown = selOrder.length;          // remember the unfiltered count for the "N / M" readout
        document.getElementById('filterClear').style.display = f ? 'block' : 'none';
        updateCounts();
        scheduleSaveUiState();
    }

    document.getElementById('refreshBtn').addEventListener('click', function () { postToHost({ action: 'refresh' }); });
    document.getElementById('filter').addEventListener('input', render);
    document.getElementById('filterClear').addEventListener('click', function () {
        var fi = document.getElementById('filter'); fi.value = ''; fi.focus(); render();
    });
    document.getElementById('fontDec').addEventListener('click', function () { fontScale -= 0.1; applyFont(); scheduleSaveUiState(); });
    document.getElementById('fontInc').addEventListener('click', function () { fontScale += 0.1; applyFont(); scheduleSaveUiState(); });
    document.getElementById('themeBtn').addEventListener('click', function () { darkMode = !darkMode; applyTheme(); scheduleSaveUiState(); });
    // Section customization (⚙): open/close the overlay; backdrop click closes; footer controls.
    // ⚙ opens the floating NATIVE settings window (a real top-level window that can move anywhere over the
    // IDE, unlike an in-webview overlay which is clipped to this pane). The host creates/show()s it.
    document.getElementById('settingsBtn').addEventListener('click', function () { postToHost({ action: 'openSettings' }); });
    document.getElementById('settingsClose').addEventListener('click', function () { if (SETTINGS_MODE) postToHost({ action: 'closeSettings' }); else closeSettings(); });
    document.getElementById('settingsOverlay').addEventListener('click', function (e) { if (!SETTINGS_MODE && e.target === this) closeSettings(); });
    document.getElementById('hideEmptyChk').addEventListener('change', function () { hideEmptySections = this.checked; commitSettings(); });
    document.getElementById('resetSettingsBtn').addEventListener('click', resetSections);
    // Drag the popup by its header so it can be parked aside while you preview changes live.
    (function () {
        var panel = document.querySelector('#settingsOverlay .panel');
        var hdr = document.querySelector('#settingsOverlay .panel-hdr');
        if (!panel || !hdr) return;
        var dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;
        hdr.addEventListener('mousedown', function (e) {
            if (e.target && e.target.id === 'settingsClose') return;   // let the × button click through
            var r = panel.getBoundingClientRect();
            ox = r.left; oy = r.top; sx = e.clientX; sy = e.clientY; dragging = true;
            panel.style.left = ox + 'px'; panel.style.top = oy + 'px'; panel.style.right = 'auto';
            e.preventDefault();
        });
        document.addEventListener('mousemove', function (e) {
            if (!dragging) return;
            var nx = ox + (e.clientX - sx), ny = oy + (e.clientY - sy);
            nx = Math.max(0, Math.min(nx, window.innerWidth - 60));    // keep the header grabbable
            ny = Math.max(0, Math.min(ny, window.innerHeight - 24));
            panel.style.left = nx + 'px'; panel.style.top = ny + 'px';
        });
        document.addEventListener('mouseup', function () { dragging = false; });
    })();
    // Escape: close the settings overlay first; else clear the filter text; else the multi-selection.
    document.addEventListener('keydown', function (e) {
        if (e.key !== 'Escape') return;
        // Only close the in-pad overlay with Escape. In settings mode the overlay IS the whole window, so
        // closing it would blank the native window with no recovery — let the OS handle close there.
        var ov = document.getElementById('settingsOverlay');
        if (!SETTINGS_MODE && ov && ov.style.display !== 'none') { e.preventDefault(); closeSettings(); return; }
        var fi = document.getElementById('filter');
        var inFilter = document.activeElement === fi;
        if (inFilter && fi.value) { e.preventDefault(); fi.value = ''; render(); return; }
        if (Object.keys(selSet).length) { e.preventDefault(); selSet = {}; lastSel = null; applySel(); }
    });
    if (SETTINGS_MODE) document.body.classList.add('settings-mode');   // hide pad chrome; show only the card UI
    applyTheme(); applyFont();   // sane defaults before the persisted UI-state restore message arrives

    // Settings window: open the card UI IMMEDIATELY with current defaults so the window is NEVER blank — even if
    // the host's restoreUiState message is dropped/delayed. The restoreUiState handler also opens it and will
    // re-render with the persisted layout when it arrives. (Previously the panel opened ONLY inside that handler,
    // so a missed message left the whole window blank, since settings-mode hides all other chrome.)
    if (SETTINGS_MODE) { try { openSettings(); } catch (ex) {} }

    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.addEventListener('message', function (e) {
            var msg = e.data;
            if (typeof msg === 'string') { try { msg = JSON.parse(msg); } catch (ex) { return; } }
            if (msg.type === 'restoreUiState') {
                // Restore persisted collapse/expand state BEFORE the first data render. No pad render here —
                // the setSymbols that follows does it. In settings mode there is no setSymbols, so open the
                // card UI now that the state is loaded. openSettings() / applyTheme() run OUTSIDE the parse
                // try so a corrupt/unparseable blob still renders the card UI (with defaults) — never a blank
                // window with no Reset path.
                try {
                    var st = typeof msg.state === 'string' ? JSON.parse(msg.state) : msg.state;
                    if (st) applyState(st);
                } catch (ex) {}
                sectionCollapsedDelta = {};   // fresh seed → drop any accumulated window delta (avoids re-applying stale toggles after reopen)
                applyTheme(); applyFont();
                if (SETTINGS_MODE) openSettings();
                return;
            }
            if (msg.type === 'applyLayout') {
                // Pushed by the floating settings window when the layout changed. Apply ONLY the section-layout
                // fields — the pad keeps its own theme/zoom/tree-collapse/detail state (the settings window's
                // copy of those is a stale open-time snapshot and must not overwrite live pad state). The pad
                // is the single writer: render() persists the merged result. Clear the multi-selection first —
                // its keys are render-order-scoped, so a reorder could otherwise re-bind a stale key to a
                // different row (wrong highlight / wrong insert text).
                try {
                    var st2 = typeof msg.state === 'string' ? JSON.parse(msg.state) : msg.state;
                    if (st2) {
                        selSet = {}; lastSel = null;
                        if (Array.isArray(st2.sectionOrder)) sectionOrder = st2.sectionOrder;
                        if (st2.sectionHidden) sectionHidden = st2.sectionHidden;
                        if (typeof st2.hideEmptySections === 'boolean') hideEmptySections = st2.hideEmptySections;
                        // MERGE only the section-collapse keys the window actually toggled (a delta), so whole-
                        // section folds the user made in the pad while the window is open are NOT clobbered by the
                        // window's stale snapshot. sectionCollapsed keys are section ids (same space as the delta).
                        if (st2.sectionCollapsedDelta) {
                            for (var k in st2.sectionCollapsedDelta) {
                                if (Object.prototype.hasOwnProperty.call(st2.sectionCollapsedDelta, k))
                                    sectionCollapsed[k] = st2.sectionCollapsedDelta[k];
                            }
                        }
                        render();
                        // Persist IMMEDIATELY (not via render()'s 400ms debounce): the settings window may be
                        // closed and reopened right after an edit, and its ReseedState() reads from disk — a
                        // debounced write would let the reopen observe stale state and roll the edit back.
                        flushSaveUiState();
                    }
                } catch (ex) {}
                return;
            }
            if (msg.type === 'setSymbols') {
                // New data set: drop any prior multi-selection. Selection keys are render-order-scoped
                // (text + occurrence), so a stale key could silently point at a DIFFERENT row after a
                // refresh/data change — clear it rather than risk inserting the wrong field.
                selSet = {}; lastSel = null;
                // The procedure this payload is for — sent back with a ＋Add click so the host validates the add
                // against what's actually ON SCREEN now (avoids a wrong-procedure add during a rapid proc switch).
                renderedProcedure = msg.procedure || '';
                // #title stays the fixed pad name ("Explorer"); the per-procedure title goes to #counts
                // (via updateCounts), which render() calls at the end. Don't overwrite #title here.
                procTitle = msg.title || '';
                var byName = function (a, b) { return (a.name || '').toLowerCase().localeCompare((b.name || '').toLowerCase()); };
                locals = (msg.locals || []).slice(); // declaration order — matches Clarion's native Data pad; do NOT sort
                otherFiles = (msg.otherFiles || []).slice().sort(byName); // Clarion lists Other Files alphabetically
                routines = (msg.routines || []).slice().sort(byName);
                localProcedures = (msg.localProcedures || []).slice().sort(byName);
                moduleData = (msg.moduleData || []).slice().sort(byName);
                globals = (msg.globals || []).slice(); // declaration order from the .txa [PROGRAM][DATA]; do NOT sort
                procedures = (msg.procedures || []).slice().sort(byName);
                tables = (msg.tables || []).slice().sort(byName); // alphabetical, like Other Files; keep dict column order
                // File Schematic: prefer the live per-instance scopes; if the host couldn't read the live tree
                // (it sends none), fall back to the flat .txa browse file folded into a single scope so the
                // section still shows the File-Browsing List Box. One canonical section either way.
                fileScopes = (msg.fileScopes || []).slice();
                browseFiles = (msg.browseFiles || []).slice();
                if (!fileScopes.length && browseFiles.length)
                    fileScopes = [{ label: 'File-Browsing List Box', instance: 'browse', files: browseFiles }];
                render();
            }
            if (msg.type === 'setExplorerData') {
                // Files tab payload (host -> JS). Store and render the Files panel. See renderExplorer().
                explorerData = msg;
                // The payload also carries the active bucket — refresh the banner so it self-corrects if the first
                // setVersionInfo (posted at startup) captured "no solution" before the solution finished loading.
                if (msg.versionTag) setVerBanner(msg.versionTag, msg.solutionTag);
                if (msg.uiState && msg.uiState.collapsed) {
                    explorerCollapsed = {};
                    (msg.uiState.collapsed || []).forEach(function (g) { explorerCollapsed[g] = true; });
                }
                renderExplorer();
            }
            if (msg.type === 'setVersionInfo') {
                // Banner under the title: which Clarion-version + solution bucket the recents/pins come from
                // (saved per version + solution — see ExplorerRecentsStore). Makes a version switch obvious.
                setVerBanner(msg.versionTag, msg.solutionTag);
                return;
            }
        });
    }

    // Ctrl/Cmd+V while hovering a Local/Global section header pastes clipboard declaration text into that scope
    // (the host reads the OS clipboard). Gated on hoverScope so the target is unambiguous; ignored otherwise.
    document.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && !e.altKey && (e.key === 'v' || e.key === 'V') && hoverScope) {
            e.preventDefault();
            postToHost({ action: 'pasteVariables', scope: hoverScope, procedure: renderedProcedure });
        }
    });

    // ============================================================================================
    // FILES TAB — Monaco file loader. Renders #panel-files from the host's setExplorerData payload.
    // Contract (host -> JS): { type:'setExplorerData', lastFolder, quickLocations[{key,label,dir}],
    //   pinnedFolders[{label,dir}], pinned[{name,ext,path,kind,incPath?,clwPath?}],
    //   groups:{ classes[{name,incPath,clwPath,dir,ts,incExists,clwExists,pinned}],
    //            templates|source|other[{name,ext,path,dir,ts,exists,pinned}] }, uiState:{collapsed[]} }
    // All interactions post messages to the host (handlers live host-side, items 6-8).
    // ============================================================================================
    var explorerData = null;        // last setExplorerData payload
    var explorerCollapsed = {};     // group key ('classes'|'templates'|'source'|'other') -> true when collapsed
    var explorerFilter = '';        // live filter text for recent rows

    function fIco(ext, kind) {
        var e = (ext || '').toLowerCase().replace(/^\./, '');
        if (kind === 'class' || e === 'inc') return '📗';
        if (e === 'clw') return '📘';
        if (e === 'tpl' || e === 'tpw') return '🧩';
        if (e === 'equ') return '📕';
        if (e === 'app') return '📙';
        if (e === 'trn' || e === 'dct') return '📒';
        return '📄';
    }
    // Split a filename into base + extension so the extension can be colored. Returns [base, '.ext'] or [name,''].
    function splitExt(name, ext) {
        if (ext) { var b = name; if (name.toLowerCase().slice(-ext.length) === ext.toLowerCase()) b = name.slice(0, -ext.length); return [b, ext]; }
        var i = name.lastIndexOf('.');
        if (i > 0) return [name.slice(0, i), name.slice(i)];
        return [name, ''];
    }
    function explorerMatch(name, path) {
        if (!explorerFilter) return true;
        var q = explorerFilter;
        return (name && name.toLowerCase().indexOf(q) >= 0) || (path && path.toLowerCase().indexOf(q) >= 0);
    }
    // A small action button (the ↗ ⇄ ⧉ 🗁 ☆ ✕ glyphs on a row). cls extra ('del'/'both') styles it.
    function actBtn(glyph, title, cls, onClick) {
        var a = document.createElement('span');
        a.className = 'a' + (cls ? ' ' + cls : '');
        a.textContent = glyph; a.title = title;
        a.addEventListener('click', function (e) { e.stopPropagation(); onClick(); });
        return a;
    }

    // Build one normal (non-class) file row. entry: {name,ext,path,dir,ts,exists,pinned}. `pinnedSection`
    // true renders the compact pinned-row layout (📌 + unpin) instead of the recents action cluster.
    function buildFileRow(entry, pinnedSection) {
        var row = document.createElement('div');
        row.className = 'frow2' + (entry.exists === false ? ' missing' : '');
        if (entry.exists === false) row.title = 'missing on disk';
        var ico = document.createElement('span'); ico.className = 'fico'; ico.textContent = fIco(entry.ext, entry.kind); row.appendChild(ico);

        var meta = document.createElement('span'); meta.className = 'meta';
        var fname = document.createElement('div'); fname.className = 'fname';
        var parts = splitExt(entry.name || '', entry.ext);
        fname.appendChild(document.createTextNode(parts[0]));
        if (parts[1]) { var ex = document.createElement('span'); ex.className = 'ext'; ex.textContent = parts[1]; fname.appendChild(ex); }
        meta.appendChild(fname);
        var fpath = document.createElement('div'); fpath.className = 'fpath'; fpath.textContent = entry.dir || ''; meta.appendChild(fpath);
        row.appendChild(meta);

        if (pinnedSection) {
            var pin = document.createElement('span'); pin.className = 'pin'; pin.textContent = '📌'; row.appendChild(pin);
            var pacts = document.createElement('span'); pacts.className = 'acts';
            pacts.appendChild(actBtn('↗', 'Open in Monaco', '', function () { postToHost({ action: 'loadFile', path: entry.path }); }));
            pacts.appendChild(actBtn('⇄', 'Compare with…', '', function () { postToHost({ action: 'compare', a: entry.path }); }));
            pacts.appendChild(actBtn('⧉', 'Copy path', '', function () { postToHost({ action: 'copyPath', path: entry.path }); }));
            pacts.appendChild(actBtn('🗁', 'Reveal in Explorer', '', function () { postToHost({ action: 'reveal', path: entry.path }); }));
            pacts.appendChild(actBtn('★', 'Unpin', 'del', function () { postToHost({ action: 'unpin', path: entry.path }); }));
            row.appendChild(pacts);
        } else {
            var time = document.createElement('span'); time.className = 'ftime'; time.textContent = entry.ts || ''; row.appendChild(time);
            var acts = document.createElement('span'); acts.className = 'acts';
            acts.appendChild(actBtn('↗', 'Open in Monaco', '', function () { postToHost({ action: 'loadFile', path: entry.path }); }));
            acts.appendChild(actBtn('⇄', 'Compare with…', '', function () { postToHost({ action: 'compare', a: entry.path }); }));
            acts.appendChild(actBtn('⧉', 'Copy path', '', function () { postToHost({ action: 'copyPath', path: entry.path }); }));
            acts.appendChild(actBtn('🗁', 'Reveal in Explorer', '', function () { postToHost({ action: 'reveal', path: entry.path }); }));
            acts.appendChild(actBtn(entry.pinned ? '★' : '☆', entry.pinned ? 'Unpin' : 'Pin', '',
                function () { postToHost({ action: entry.pinned ? 'unpin' : 'pin', path: entry.path }); }));
            acts.appendChild(actBtn('✕', 'Remove from list', 'del', function () { postToHost({ action: 'removeRecent', path: entry.path }); }));
            row.appendChild(acts);
        }
        // Primary action: clicking the row body (not an action glyph) opens the file.
        row.addEventListener('click', function () { postToHost({ action: 'loadFile', path: entry.path }); });
        return row;
    }

    // Build one class-pair row: name + dim-able .inc/.clw chips, "open both" primary + the recents cluster.
    function buildClassRow(entry) {
        var row = document.createElement('div');
        var anyMissing = entry.incExists === false || entry.clwExists === false;
        row.className = 'frow2 class-row' + (anyMissing ? ' missing' : '');
        if (anyMissing) row.title = 'missing on disk';
        var ico = document.createElement('span'); ico.className = 'fico'; ico.textContent = '📗'; row.appendChild(ico);

        var meta = document.createElement('span'); meta.className = 'meta';
        var fname = document.createElement('div'); fname.className = 'fname';
        fname.appendChild(document.createTextNode(entry.name || ''));
        // .inc chip
        var incChip = document.createElement('span');
        incChip.className = 'pairchip inc' + (entry.incExists === false ? ' missing' : '');
        incChip.textContent = '.inc'; incChip.title = entry.incExists === false ? 'missing on disk' : 'Open just the .inc';
        if (entry.incPath) incChip.addEventListener('click', function (e) { e.stopPropagation(); postToHost({ action: 'loadFile', path: entry.incPath }); });
        fname.appendChild(incChip);
        // .clw chip
        var clwChip = document.createElement('span');
        clwChip.className = 'pairchip clw' + (entry.clwExists === false ? ' missing' : '');
        clwChip.textContent = '.clw'; clwChip.title = entry.clwExists === false ? 'missing on disk' : 'Open just the .clw';
        if (entry.clwPath) clwChip.addEventListener('click', function (e) { e.stopPropagation(); postToHost({ action: 'loadFile', path: entry.clwPath }); });
        fname.appendChild(clwChip);
        meta.appendChild(fname);
        var fpath = document.createElement('div'); fpath.className = 'fpath'; fpath.textContent = entry.dir || ''; meta.appendChild(fpath);
        row.appendChild(meta);

        var time = document.createElement('span'); time.className = 'ftime'; time.textContent = entry.ts || ''; row.appendChild(time);

        var acts = document.createElement('span'); acts.className = 'acts';
        acts.appendChild(actBtn('⧉↗', 'Open BOTH (.inc + .clw) in separate editors', 'both',
            function () { postToHost({ action: 'openClassPair', inc: entry.incPath, clw: entry.clwPath }); }));
        // Compare the pair DIRECTLY when both sides exist (the row promises ".inc ↔ .clw"); otherwise seed
        // the host's picker with whichever single side we have.
        var cmpMsg = (entry.incPath && entry.clwPath)
            ? { action: 'compare', a: entry.incPath, b: entry.clwPath }
            : { action: 'compare', a: entry.clwPath || entry.incPath };
        acts.appendChild(actBtn('⇄', 'Compare .inc ↔ .clw', '', function () { postToHost(cmpMsg); }));
        acts.appendChild(actBtn('⧉', 'Copy path', '', function () { postToHost({ action: 'copyPath', path: entry.incPath || entry.clwPath }); }));
        acts.appendChild(actBtn('🗁', 'Reveal in Explorer', '', function () { postToHost({ action: 'reveal', path: entry.incPath || entry.clwPath }); }));
        acts.appendChild(actBtn(entry.pinned ? '★' : '☆', entry.pinned ? 'Unpin' : 'Pin', '',
            function () { postToHost({ action: entry.pinned ? 'unpin' : 'pin', path: entry.incPath || entry.clwPath }); }));
        // Remove BOTH sides of the pair so the partner recent can't re-fold the row back next render.
        acts.appendChild(actBtn('✕', 'Remove from list', 'del', function () { postToHost({ action: 'removeRecent', path: entry.incPath, path2: entry.clwPath }); }));
        row.appendChild(acts);

        // Primary action: open both .inc + .clw.
        row.addEventListener('click', function () { postToHost({ action: 'openClassPair', inc: entry.incPath, clw: entry.clwPath }); });
        return row;
    }

    // A collapsible group header. key persists collapse via saveExplorerUiState. countText is the label suffix.
    function buildGroupHeader(host, key, label, countText) {
        var collapsed = !!explorerCollapsed[key];
        var sec = document.createElement('div'); sec.className = 'fsec grp';
        var caret = document.createElement('span'); caret.className = 'caret'; caret.textContent = collapsed ? '▸' : '▾'; sec.appendChild(caret);
        sec.appendChild(document.createTextNode(' ' + label + ' '));
        var cnt = document.createElement('span'); cnt.className = 'count'; cnt.textContent = countText; sec.appendChild(cnt);
        var line = document.createElement('span'); line.className = 'sec-line'; sec.appendChild(line);
        sec.addEventListener('click', function () {
            explorerCollapsed[key] = !explorerCollapsed[key];
            saveExplorerUiState();
            renderExplorer();
        });
        host.appendChild(sec);
        return collapsed;
    }

    function saveExplorerUiState() {
        var collapsed = [];
        for (var k in explorerCollapsed) if (explorerCollapsed[k]) collapsed.push(k);
        postToHost({ action: 'saveExplorerUiState', state: { collapsed: collapsed } });
    }

    // Build the quick-location chips + the "pin folder" chip.
    function buildQuickChips(host, d) {
        var quick = document.createElement('div'); quick.className = 'quick';
        var ql = document.createElement('span'); ql.className = 'ql-label'; ql.textContent = 'Quick locations'; quick.appendChild(ql);
        (d.quickLocations || []).forEach(function (q) {
            var chip = document.createElement('span'); chip.className = 'chip';
            var star = document.createElement('span'); star.className = 'star'; star.textContent = '★'; chip.appendChild(star);
            chip.appendChild(document.createTextNode(' ' + (q.label || q.key || q.dir)));
            chip.title = q.dir || '';
            chip.addEventListener('click', function () { postToHost({ action: 'pickFolderAndLoad', dir: q.dir }); });
            quick.appendChild(chip);
        });
        // Pinned folders the user added (rendered alongside the quick locations).
        (d.pinnedFolders || []).forEach(function (pf) {
            var chip = document.createElement('span'); chip.className = 'chip';
            chip.appendChild(document.createTextNode('📁 ' + (pf.label || pf.dir)));
            chip.title = pf.dir || '';
            chip.addEventListener('click', function () { postToHost({ action: 'pickFolderAndLoad', dir: pf.dir }); });
            quick.appendChild(chip);
        });
        // "Last folder" convenience chip.
        if (d.lastFolder) {
            var lf = document.createElement('span'); lf.className = 'chip';
            lf.appendChild(document.createTextNode('🕘 Last folder'));
            lf.title = d.lastFolder;
            lf.addEventListener('click', function () { postToHost({ action: 'pickFolderAndLoad', dir: d.lastFolder }); });
            quick.appendChild(lf);
        }
        var add = document.createElement('span'); add.className = 'chip add';
        add.textContent = '＋ pin folder'; add.title = 'Pin a folder for quick access';
        add.addEventListener('click', function () { postToHost({ action: 'pinFolder' }); });
        quick.appendChild(add);
        host.appendChild(quick);
    }

    function buildGroupRows(host, key, label, suffix, entries, isClasses) {
        var shown = (entries || []).filter(function (e) {
            return isClasses ? explorerMatch(e.name, e.dir || e.incPath || e.clwPath)
                             : explorerMatch(e.name, e.path || e.dir);
        });
        if (!shown.length) return;   // hide an empty (or fully-filtered) group entirely
        var count = isClasses ? (entries.length + ' pair' + (entries.length === 1 ? '' : 's')) : (entries.length + suffix);
        var collapsed = buildGroupHeader(host, key, label, count);
        if (key === 'classes') {
            var note = document.createElement('div'); note.className = 'fsec-note';
            note.textContent = 'opening a class loads its .inc + .clw into two separate editors';
            host.appendChild(note);
        }
        if (collapsed) return;
        shown.forEach(function (e) { host.appendChild(isClasses ? buildClassRow(e) : buildFileRow(e, false)); });
    }

    function renderExplorer() {
        var d = explorerData;
        var body = document.getElementById('filesBody');
        if (!body) return;
        body.innerHTML = '';
        if (!d) { var em = document.createElement('div'); em.className = 'files-empty'; em.textContent = 'Loading recent files…'; body.appendChild(em); return; }

        // Last-folder strip
        var strip = document.getElementById('lastFolderStrip');
        var lfp = document.getElementById('lastFolderPath');
        if (d.lastFolder) { lfp.textContent = d.lastFolder; lfp.title = d.lastFolder; strip.style.display = 'flex'; }
        else { strip.style.display = 'none'; }

        // Quick locations + pinned-folder chips
        buildQuickChips(body, d);

        // Pinned files
        var pinned = (d.pinned || []).filter(function (e) { return explorerMatch(e.name, e.path || e.dir); });
        if (pinned.length) {
            var ps = document.createElement('div'); ps.className = 'fsec';
            ps.appendChild(document.createTextNode('📌 Pinned '));
            var pc = document.createElement('span'); pc.className = 'count'; pc.textContent = String((d.pinned || []).length); ps.appendChild(pc);
            var pl = document.createElement('span'); pl.className = 'sec-line'; ps.appendChild(pl);
            body.appendChild(ps);
            pinned.forEach(function (e) { body.appendChild(buildFileRow(e, true)); });
        }

        // Recents grouped by type
        var g = d.groups || {};
        buildGroupRows(body, 'classes',   '📗 Classes',   '',            g.classes,   true);
        buildGroupRows(body, 'templates', '🧩 Templates', ' · .tpl .tpw', g.templates, false);
        buildGroupRows(body, 'source',    '📘 Source',    ' · .clw .equ', g.source,    false);
        buildGroupRows(body, 'other',     '📦 Other',     ' · .app .trn …', g.other,   false);

        // No pinned files and no recents in any group → a gentle empty note (the chips + drop zone still show).
        if (!pinned.length && !hasAnyGroup(g)) {
            var none = document.createElement('div'); none.className = 'files-empty';
            none.textContent = explorerFilter ? 'No files match the filter.' : 'No recent files yet — use Load File… or drop files below.';
            body.appendChild(none);
        }
    }
    function hasAnyGroup(g) {
        return ((g.classes && g.classes.length) || (g.templates && g.templates.length)
             || (g.source && g.source.length) || (g.other && g.other.length)) ? true : false;
    }

    // ---- Files toolbar / strip wiring ----
    (function wireExplorer() {
        var loadBtn = document.getElementById('loadFileBtn');
        if (loadBtn) loadBtn.addEventListener('click', function () { postToHost({ action: 'loadFileDialog' }); });
        var cmpBtn = document.getElementById('compareBtn');
        if (cmpBtn) cmpBtn.addEventListener('click', function () { postToHost({ action: 'compare' }); });
        var change = document.getElementById('lastFolderChange');
        if (change) change.addEventListener('click', function () { postToHost({ action: 'setLastFolder' }); });

        var ff = document.getElementById('filesFilter');
        var ffx = document.getElementById('filesFilterClear');
        if (ff) ff.addEventListener('input', function () {
            explorerFilter = (ff.value || '').trim().toLowerCase();
            if (ffx) ffx.style.display = ff.value ? 'block' : 'none';
            renderExplorer();
        });
        if (ffx) ffx.addEventListener('click', function () { ff.value = ''; explorerFilter = ''; ffx.style.display = 'none'; ff.focus(); renderExplorer(); });

        // Drop zone (and whole scroll area): dropping files opens them. In WebView2 a dropped file's full path
        // is usually NOT exposed to JS (security) — File.path is empty in the browser. We send whatever we can
        // (file.name plus webkitRelativePath if present); the host resolves real paths from its own drop hook
        // when available. preventDefault on dragover is required to allow the drop.
        var dz = document.getElementById('dropZone');
        var scroll = document.getElementById('filesScroll');
        function onDragOver(e) { e.preventDefault(); try { e.dataTransfer.dropEffect = 'copy'; } catch (ex) {} if (dz) dz.classList.add('dragover'); }
        function onDragLeave() { if (dz) dz.classList.remove('dragover'); }
        function onDrop(e) {
            e.preventDefault(); if (dz) dz.classList.remove('dragover');
            var paths = [];
            try {
                var files = (e.dataTransfer && e.dataTransfer.files) || [];
                for (var i = 0; i < files.length; i++) {
                    var fObj = files[i];
                    var p = fObj.path || fObj.webkitRelativePath || fObj.name;   // .path: Electron/WebView2 host; usually only .name in pure WebView2
                    if (p) paths.push(p);
                }
                // Fall back to dragged text (e.g. a path dragged from another pane) if no file objects.
                if (!paths.length) {
                    var t = ''; try { t = e.dataTransfer.getData('text/plain') || ''; } catch (ex2) {}
                    t = t.replace(/\r\n?/g, '\n');
                    t.split('\n').forEach(function (line) { line = line.trim(); if (line) paths.push(line); });
                }
            } catch (ex) {}
            if (paths.length) postToHost({ action: 'dropFiles', paths: paths });
        }
        if (scroll) { scroll.addEventListener('dragover', onDragOver); scroll.addEventListener('dragleave', onDragLeave); scroll.addEventListener('drop', onDrop); }
    })();

    postToHost({ action: 'ready' });
    // Prime the Files tab too (the host also re-posts setExplorerData after each mutation). Marking it
    // requested here avoids a redundant request on the first Files-tab click.
    _explorerRequested = true;
    postToHost({ action: 'requestExplorerData' });
</script>
</body>
</html>
