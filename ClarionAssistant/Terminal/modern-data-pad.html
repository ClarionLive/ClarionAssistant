<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CA Data</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 12px;
        background: #ffffff; color: #1f1f1f; overflow: hidden; }
    #bar { display: flex; align-items: center; gap: 8px; padding: 5px 8px;
        background: #f3f3f3; border-bottom: 1px solid #d4d4d4; height: 30px; }
    #bar .title { font-weight: 600; color: #1f1f1f; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #bar button { font: inherit; padding: 2px 8px; border: 1px solid #bcbcbc; border-radius: 4px;
        background: transparent; color: #0a5dc2; cursor: pointer; }
    #bar button:hover { background: #e4e8ee; }
    #filter { width: 100%; padding: 4px 8px; border: none; border-bottom: 1px solid #d4d4d4;
        font: inherit; background: #ffffff; color: #1f1f1f; }
    #list { position: absolute; top: 56px; left: 0; right: 0; bottom: 0; overflow-y: auto; background: #ffffff; }
    .section { font-weight: 600; color: #3a3a3a; background: #eef1f4; padding: 4px 10px;
        border-top: 1px solid #d4d4d4; border-bottom: 1px solid #d4d4d4;
        display: flex; align-items: center; gap: 6px; }
    .section .sec-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .section .sec-ctl { display: flex; gap: 2px; flex: none; }
    .section .sec-btn { font-size: 12px; font-weight: 400; color: #5a5a5a; padding: 0 5px;
        border-radius: 3px; cursor: pointer; line-height: 1.5; }
    .section .sec-btn:hover { background: #dbe1e8; color: #1f1f1f; }
    /* Left-aligned columns for the tree scopes (Local/Global Data): a per-section grid whose subgrid rows
       share max-content columns, so type/picture line up under the longest name/type. Indent lives inside
       the name cell so nesting doesn't shift the type/picture columns. */
    .tgrid { display: grid; grid-template-columns: max-content max-content 1fr; }
    .row.trow { display: grid; grid-template-columns: subgrid; grid-column: 1 / -1; gap: 0; }
    .row.trow .namecell { display: flex; align-items: center; gap: 6px; white-space: nowrap; padding-right: 20px; }
    .row.trow .type { font-size: 10px; color: #5a5a5a; margin-left: 0; white-space: nowrap; padding-right: 20px; }
    .row.trow .picture { font-size: 10px; color: #0a7d3a; font-family: Consolas, 'Courier New', monospace;
        min-width: 0; text-align: left; white-space: nowrap; }
    /* Same left-aligned columns for the Other Files / Declared Tables COLUMN lists. The gutter (twisty +
       "+" detail toggle) lives inside the name cell so cols 2/3 stay aligned; detail panels span all tracks. */
    .fgrid { display: grid; grid-template-columns: max-content max-content 1fr; }
    .row.frow { display: grid; grid-template-columns: subgrid; grid-column: 1 / -1; gap: 0; padding: 3px 10px 3px 44px; }
    .row.frow .gcell { display: flex; align-items: center; gap: 4px; white-space: nowrap; padding-right: 20px; }
    .row.frow .type { font-size: 10px; color: #5a5a5a; margin-left: 0; white-space: nowrap; padding-right: 20px; }
    .row.frow .picture { font-size: 10px; color: #0a7d3a; font-family: Consolas, 'Courier New', monospace;
        min-width: 0; text-align: left; white-space: nowrap; }
    .fgrid .detail { grid-column: 1 / -1; }
    .tgrid .detail { grid-column: 1 / -1; }
    .row { display: flex; align-items: center; gap: 8px; padding: 3px 10px; cursor: pointer; user-select: none; }
    .row:hover { background: #e8eef7; }
    .row .kind { font-size: 10px; color: #6f42c1; min-width: 56px; }
    .row .name { color: #1f1f1f; }
    .row .type { font-size: 10px; color: #5a5a5a; margin-left: auto; }
    .row .picture { font-size: 10px; color: #0a7d3a; font-family: Consolas, 'Courier New', monospace; min-width: 40px; text-align: right; }
    .row .pre { font-size: 10px; color: #8a8a8a; margin-left: 8px; }
    .detail-tog { min-width: 12px; text-align: center; color: #0a5dc2; font-weight: bold; cursor: pointer; font-family: Consolas, 'Courier New', monospace; }
    .detail-tog:hover { color: #08408a; }
    .badge { font-size: 9px; font-weight: 700; padding: 0 4px; margin-left: 6px; border-radius: 3px; line-height: 1.4; }
    .badge.pk { background: #ffe7a3; color: #7a5b00; }
    .badge.uniq { background: #cfe3ff; color: #0a4a8a; }
    .detail { font-size: 11px; color: #555; background: #f6f8fa; border-left: 2px solid #cdd9e5; padding: 4px 10px; white-space: normal; }
    .detail .attr { font-family: Consolas, 'Courier New', monospace; color: #3a3a3a; }
    .detail .cmt { color: #0a7d3a; font-style: italic; }
    .comp-row { background: #f6f8fa; }
    .comp-row .name { color: #1f1f1f; }
    .row .act { color: #0a5dc2; cursor: pointer; min-width: 14px; text-align: center; opacity: 0.6; }
    .row .act:hover { opacity: 1; }
    .row .lineno { font-size: 10px; color: #0a5dc2; text-decoration: underline; cursor: pointer;
                   margin-left: auto; font-family: Consolas, 'Courier New', monospace; padding: 0 2px; }
    .row .lineno:hover { color: #1e66f5; background: #dbe6f5; }
    .row .params { font-size: 10px; color: #5a5a5a; margin-left: 6px; font-family: Consolas, 'Courier New', monospace; }
    .row.selected, .row.selected:hover { background: #cfe0f7; }
    /* Multi-select (Ctrl/Shift-click) — distinct from the proc single-select: stronger blue + left accent. */
    .row.multisel, .row.multisel:hover { background: #b9d4f5; box-shadow: inset 3px 0 0 #1e66f5; }
    .twisty { color: #555; min-width: 12px; display: inline-block; text-align: center; }
    .table-hdr { font-weight: 600; color: #0a5dc2; }
    .table-hdr .twisty { color: #555; min-width: 12px; }
    .col-row { padding-left: 26px; }
    .col-row .name { color: #b0152e; }
    .empty { padding: 14px; color: #777777; }
</style>
</head>
<body>
    <div id="bar">
        <span class="title" id="title">Data</span>
        <button id="refreshBtn" title="Refresh from the active CA Embeditor">Refresh</button>
    </div>
    <input id="filter" placeholder="Filter…" />
    <div id="list"><div class="empty">Open a procedure in the CA Embeditor, then Refresh.</div></div>

<script>
    var locals = [];
    var tables = [];
    var otherFiles = [];
    var browseFiles = [];      // File-Browsing List Box: the proc's PRIMARY file + browse key
    var routines = [];
    var moduleData = [];
    var globals = [];
    var procedures = [];
    var selectedProc = null;   // Procedures section: the row the user single-clicked (header "Open" target)
    var collapsed = {};        // tableName -> true when a table's columns are collapsed
    var sectionCollapsed = {}; // section key -> true when a whole section is collapsed
    var localCollapsed = {};   // local-tree node path -> true when a QUEUE/GROUP node is collapsed
    var detailOpen = {};       // node path -> true when an Other Files "+" detail panel is expanded
    var relExpanded = {};      // relations-folder path -> true when expanded (DEFAULT collapsed, unlike Keys/Columns)
    // Multi-select (drag a block of items): Ctrl/Cmd-click toggles a row, Shift-click selects a range.
    var selSet = {};           // selkey -> insert text (the current multi-selection)
    var selOrder = [];         // [{key,text}] in the LAST render order — shift-range anchor + block order
    var lastSel = null;        // selkey of the last Ctrl/Shift-clicked row (the shift-range anchor)
    var _selOcc = {};          // render-scoped: text -> occurrence count, so duplicate names get stable keys

    // LSP SymbolKind -> short label
    function kindLabel(k) {
        switch (k) {
            case 5: return 'class'; case 6: return 'method'; case 7: return 'property';
            case 8: return 'field'; case 10: return 'enum'; case 12: return 'function';
            case 13: return 'var'; case 14: return 'const'; case 18: return 'array';
            case 19: return 'group'; case 22: return 'member'; case 23: return 'struct';
            default: return '';
        }
    }

    function postToHost(obj) {
        try { window.chrome.webview.postMessage(JSON.stringify(obj)); } catch (e) {}
    }

    function insert(name) { postToHost({ action: 'insert', name: name }); }

    // Repaint the multi-select highlight from selSet WITHOUT a full render() — keeps row elements alive so a
    // double-click (insert) still fires after the selecting single-clicks. Valid until the next render()
    // (which rebuilds selOrder with fresh element refs and re-applies the class during construction).
    function applySel() {
        for (var i = 0; i < selOrder.length; i++) {
            var e = selOrder[i];
            if (e.el) e.el.classList.toggle('multisel', selSet[e.key] !== undefined);
        }
    }

    // A draggable + multi-selectable list row carrying its compilable (prefixed) insert text as text/plain.
    // The drop lands in the Modern Embeditor's Monaco webview (a SEPARATE WebView2); our installDropInsert
    // inserts it at the drop point and the readOnly guard gates it to editable slots. Windows-standard select:
    //   - Plain click  → select just this row, clearing others, and set the Shift anchor.
    //   - Ctrl/Cmd-click → toggle this row, keeping the rest.
    //   - Shift-click  → select the range from the anchor to this row (in list order).
    //   - Dragging a SELECTED row drops the WHOLE selection as a block (one item per line, list order);
    //     dragging an UNSELECTED row drops just this row.
    // pass plainSelect=false for rows that own a competing plain-click action (Procedures: select-for-Open).
    function makeDraggable(row, text, plainSelect) {
        if (!text) return;
        if (plainSelect === undefined) plainSelect = true;
        // Stable selection key: text + per-render occurrence index (handles duplicate names across tables).
        var occ = (_selOcc[text] || 0); _selOcc[text] = occ + 1;
        var key = text + '#' + occ;
        selOrder.push({ key: key, text: text, el: row });
        if (selSet[key] !== undefined) row.classList.add('multisel');

        row.addEventListener('mousedown', function (e) {
            if (e.shiftKey || e.ctrlKey || e.metaKey) { e.preventDefault(); e.stopPropagation(); }
        }, true);
        row.addEventListener('click', function (e) {
            // Clicks on the chevron / "+" detail / action / line-number children do their own thing — never select.
            var t = e.target;
            if (t && t !== row && (t.classList.contains('twisty') || t.classList.contains('detail-tog')
                || t.classList.contains('act') || t.classList.contains('lineno'))) return;
            if (e.shiftKey) {
                e.preventDefault(); e.stopPropagation();
                selectRangeTo(key); applySel();
            } else if (e.ctrlKey || e.metaKey) {
                e.preventDefault(); e.stopPropagation();
                if (selSet[key] !== undefined) delete selSet[key]; else selSet[key] = text;
                lastSel = key; applySel();
            } else if (plainSelect) {
                selSet = {}; selSet[key] = text; lastSel = key; applySel();
            }
        }, true);

        row.draggable = true;
        row.addEventListener('dragstart', function (e) {
            var payload = text;
            if (selSet[key] !== undefined) {
                var parts = [];
                for (var i = 0; i < selOrder.length; i++)
                    if (selSet[selOrder[i].key] !== undefined) parts.push(selOrder[i].text);
                if (parts.length) payload = parts.join('\n');
            }
            try { e.dataTransfer.setData('text/plain', payload); e.dataTransfer.effectAllowed = 'copy'; }
            catch (ex) {}
        });
        row.addEventListener('dragend', function (e) {
            try { if (e.dataTransfer && e.dataTransfer.dropEffect && e.dataTransfer.dropEffect !== 'none') { selSet = {}; applySel(); } }
            catch (ex) {}
        });
    }

    // Shift-click: select every row between the anchor (lastSel) and the clicked key inclusive, in current
    // render order. With no anchor yet, behaves like a single select.
    function selectRangeTo(key) {
        var idx = -1, anchor = -1, i;
        for (i = 0; i < selOrder.length; i++) {
            if (selOrder[i].key === key) idx = i;
            if (selOrder[i].key === lastSel) anchor = i;
        }
        if (idx < 0) return;
        selSet = {};   // Windows-standard: Shift-click replaces the selection with the anchor→target range.
        if (anchor < 0) { selSet[key] = selOrder[idx].text; lastSel = key; return; }
        var lo = Math.min(idx, anchor), hi = Math.max(idx, anchor);
        for (i = lo; i <= hi; i++) selSet[selOrder[i].key] = selOrder[i].text;
    }

    // Persist the collapse/expand UI state (debounced) so it survives the embeditor closing/reopening. The
    // host stores it as an opaque blob; the font zoom is persisted separately (WebView2 ZoomFactor).
    var _saveTimer = null;
    function scheduleSaveUiState() {
        if (_saveTimer) clearTimeout(_saveTimer);
        _saveTimer = setTimeout(function () {
            _saveTimer = null;
            try {
                postToHost({
                    action: 'saveUiState',
                    state: JSON.stringify({
                        sectionCollapsed: sectionCollapsed, localCollapsed: localCollapsed,
                        relExpanded: relExpanded, detailOpen: detailOpen
                    })
                });
            } catch (e) {}
        }, 400);
    }

    function makeRow(cls, kindText, nameText, typeText, title, insertText, action) {
        var row = document.createElement('div');
        row.className = 'row' + (cls ? ' ' + cls : '');
        row.title = title || nameText;
        if (action) {
            var a = document.createElement('span');
            a.className = 'act'; a.textContent = action.icon; a.title = action.title;
            a.addEventListener('click', function (e) {
                e.stopPropagation();
                postToHost({ action: action.type, name: nameText });
            });
            row.appendChild(a);
        }
        if (kindText !== null) { var k = document.createElement('span'); k.className = 'kind'; k.textContent = kindText; row.appendChild(k); }
        var n = document.createElement('span'); n.className = 'name'; n.textContent = nameText; row.appendChild(n);
        if (typeText) { var t = document.createElement('span'); t.className = 'type'; t.textContent = typeText; row.appendChild(t); }
        if (insertText) { row.addEventListener('dblclick', function () { insert(insertText); }); makeDraggable(row, insertText); }
        return row;
    }

    function render() {
        // Reset the per-render multi-select trackers BEFORE any makeDraggable() call rebuilds the rows.
        selOrder = []; _selOcc = {};
        var f = (document.getElementById('filter').value || '').trim().toLowerCase();
        var match = function (s) { return !f || (s && s.toLowerCase().indexOf(f) >= 0); };
        // [11] Smarter filter: match against ANY of several text fields (descriptions / prompts / headers /
        // key types), not just names. Returns true when there is no filter, exactly like match().
        var matchAny = function () {
            if (!f) return true;
            for (var i = 0; i < arguments.length; i++) {
                var s = arguments[i];
                if (s && String(s).toLowerCase().indexOf(f) >= 0) return true;
            }
            return false;
        };
        var list = document.getElementById('list');
        list.innerHTML = '';

        // allCtl (optional): {kind:'tree'|'file', items:[...]} — when present (and the section is open), a
        // Collapse-All / Expand-All pair is shown at the far right that folds/unfolds everything in the section.
        // extraBtns (optional): [{label, title, onClick}] — custom header buttons on the far right (e.g.
        // Procedures' "Open"). Shown left of the Collapse/Expand-all pair when the section is open.
        function sectionHeader(key, label, count, allCtl, extraBtns) {
            var open = !sectionCollapsed[key] || !!f; // force-open while filtering
            var sec = document.createElement('div');
            sec.className = 'section';
            var lbl = document.createElement('span');
            lbl.className = 'sec-label';
            lbl.style.cursor = 'pointer';
            lbl.textContent = (open ? '▾ ' : '▸ ') + label + '  (' + count + ')';
            lbl.addEventListener('click', function () { sectionCollapsed[key] = !sectionCollapsed[key]; render(); });
            sec.appendChild(lbl);
            if (open && (allCtl || (extraBtns && extraBtns.length))) {
                var ctl = document.createElement('span'); ctl.className = 'sec-ctl';
                (extraBtns || []).forEach(function (b) {
                    var btn = document.createElement('span'); btn.className = 'sec-btn';
                    btn.textContent = b.label; btn.title = b.title;
                    btn.addEventListener('click', function (e) { e.stopPropagation(); b.onClick(); });
                    ctl.appendChild(btn);
                });
                if (allCtl) {
                    var cAll = document.createElement('span'); cAll.className = 'sec-btn';
                    cAll.textContent = '⊟'; cAll.title = 'Collapse all';
                    cAll.addEventListener('click', function (e) { e.stopPropagation(); setAllInSection(key, allCtl, true); });
                    var eAll = document.createElement('span'); eAll.className = 'sec-btn';
                    eAll.textContent = '⊞'; eAll.title = 'Expand all';
                    eAll.addEventListener('click', function (e) { e.stopPropagation(); setAllInSection(key, allCtl, false); });
                    ctl.appendChild(cAll); ctl.appendChild(eAll);
                }
                sec.appendChild(ctl);
            }
            list.appendChild(sec);
            return open;
        }

        // Collapse-All / Expand-All for one section. `collapse` true folds everything; false unfolds it.
        // Keys mirror exactly what the renderers use (localCollapsed default-open, relExpanded default-closed).
        function setAllInSection(key, ctl, collapse) {
            var setOpenState = function (map, k, on) { if (on) map[k] = true; else delete map[k]; };
            if (ctl.kind === 'tree') {
                (function walkTree(arr, parentKey) {
                    (arr || []).forEach(function (it) {
                        var kids = it.children || [];
                        if (kids.length) {
                            var nkey = parentKey + '/' + (it.name || '');
                            setOpenState(localCollapsed, nkey, collapse);
                            walkTree(kids, nkey);
                        }
                    });
                })(ctl.items, key);
            } else { // 'file'
                (ctl.items || []).forEach(function (ff) {
                    var fkey = key + '/' + ff.name;
                    setOpenState(localCollapsed, fkey, collapse);            // table header (default open)
                    setOpenState(localCollapsed, fkey + '/keys', collapse);  // Keys sub-folder
                    setOpenState(localCollapsed, fkey + '/cols', collapse);  // Columns sub-folder
                    (function walkCols(cols, ck) {
                        (cols || []).forEach(function (c) {
                            if ((c.children || []).length) {
                                var nk = ck + '/' + c.name;
                                setOpenState(localCollapsed, nk, collapse);
                                walkCols(c.children, nk);
                            }
                        });
                    })(ff.columns, fkey + '/cols');
                    // Relations folder is default-CLOSED, so expand => set true, collapse => clear.
                    if ((ff.relations || []).length) {
                        if (collapse) delete relExpanded[fkey + '/rels'];
                        else relExpanded[fkey + '/rels'] = true;
                    }
                });
            }
            render();
        }

        // ----- Rich dictionary-table renderer, shared by the Tables (used by this procedure) and Other
        //   Files ([FILES][OTHERS]) sections so both render identically off the LIVE dictionary schema.
        //   Minimum-first: prefix shown once at the file header, names listed UNPREFIXED, double-click
        //   pastes the prefixed (compilable) name. A "+" on each table/key/field expands a detail panel
        //   (attributes/description/components). Keys + Columns are collapsible sub-folders. The `key`
        //   param namespaces collapse/detail state so the two sections don't collide. -----
        function richFileSection(key, label, items) {
            var esc = function (s) {
                return (s == null ? '' : String(s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            };
            // [11] Columns match on name OR description/prompt/header (recursing into GROUP children).
            var colMatch = function (c) {
                return matchAny(c.name, c.description, c.prompt, c.header) || (c.children || []).some(colMatch);
            };
            // [11] Keys match on name/description/type OR any of their component columns.
            var keyMatch = function (k) {
                return matchAny(k.name, k.description, k.keyType) || (k.components || []).some(colMatch);
            };
            var fileMatch = function (ff) {
                return matchAny(ff.name, ff.description) || (ff.columns || []).some(colMatch)
                    || (ff.keys || []).some(keyMatch);
            };
            if (!items.filter(fileMatch).length) return;
            if (!sectionHeader(key, label, items.length, { kind: 'file', items: items })) return;

            // Fixed left gutter so twisty + "+" align across rows. `hasTwisty`/`open` drive the twisty glyph;
            // `dkey` (when set) wires the "+" detail toggle. Returns the created row (already appended).
            function gutterRow(cls, name, type, insertText, padPx, hasTwisty, open, twistyToggle, dkey) {
                var row = makeRow(cls, null, name, type || '', name, insertText);
                row.style.paddingLeft = padPx + 'px';
                // "+" detail toggle (left of name, per design); empty slot keeps alignment when no detail.
                var plus = document.createElement('span');
                plus.className = 'detail-tog';
                if (dkey) {
                    plus.textContent = detailOpen[dkey] ? '−' : '+';
                    plus.title = 'Show details';
                    plus.addEventListener('click', function (e) {
                        e.stopPropagation(); detailOpen[dkey] = !detailOpen[dkey]; render();
                    });
                }
                row.insertBefore(plus, row.firstChild);
                // structural twisty (far left)
                var tw = document.createElement('span');
                tw.className = 'twisty';
                tw.textContent = hasTwisty ? (open ? '▾' : '▸') : '';
                row.insertBefore(tw, row.firstChild);
                if (hasTwisty && twistyToggle) {
                    tw.style.cursor = 'pointer';   // chevron-only expand/collapse (row body is for selection)
                    tw.addEventListener('click', function (e) { e.stopPropagation(); twistyToggle(); });
                }
                list.appendChild(row);
                return row;
            }
            function detailPanel(padPx, html) {
                var d = document.createElement('div');
                d.className = 'detail'; d.style.paddingLeft = padPx + 'px';
                d.innerHTML = html;
                list.appendChild(d);
            }

            items.forEach(function (ff) {
                if (!fileMatch(ff)) return;
                var fkey = key + '/' + ff.name;
                var fOpen = !localCollapsed[fkey] || !!f;
                var fDet = !!(ff.attributes || ff.description);
                var hdr = gutterRow('table-hdr', ff.name, '', ff.name, 10, true, fOpen,
                    function () { localCollapsed[fkey] = !localCollapsed[fkey]; render(); },
                    fDet ? ('d:' + fkey) : null);
                if (ff.prefix) {
                    var pp = document.createElement('span'); pp.className = 'pre';
                    pp.textContent = 'PRE(' + ff.prefix + ')'; hdr.appendChild(pp);
                }
                if (ff.browseKey) {
                    // File-Browsing List Box: show the key the primary file is browsed on (e.g. — AUT:AuSS_Key).
                    var bk = document.createElement('span'); bk.className = 'pre';
                    bk.textContent = '— ' + ff.browseKey; hdr.appendChild(bk);
                }
                if (fDet && detailOpen['d:' + fkey]) {
                    var attr = ff.attributes ? '<span class="attr">' + esc(ff.attributes) + '</span>' : '';
                    var cmt = ff.description ? '<span class="cmt">  ! ' + esc(ff.description) + '</span>' : '';
                    detailPanel(50, attr + cmt);
                }
                if (!fOpen) return;

                // Keys sub-folder
                var keys = (ff.keys || []).filter(function (k) { return keyMatch(k); });
                if (keys.length) {
                    var kkey = fkey + '/keys';
                    var kOpen = !localCollapsed[kkey] || !!f;
                    gutterRow('table-hdr', 'Keys', '', null, 28, true, kOpen,
                        function () { localCollapsed[kkey] = !localCollapsed[kkey]; render(); }, null);
                    if (kOpen) keys.forEach(function (k) {
                        if (!keyMatch(k)) return;
                        var ins = ff.prefix ? ff.prefix + ':' + k.name : k.name;
                        var kdkey = 'd:' + kkey + '/' + k.name;
                        var hasKDet = !!((k.components && k.components.length) || k.description || k.keyType);
                        var kr = gutterRow('col-row', k.name, '', ins, 44, false, false, null,
                            hasKDet ? kdkey : null);
                        if (k.primary) { var pb = document.createElement('span'); pb.className = 'badge pk'; pb.textContent = 'PK'; kr.appendChild(pb); }
                        if (k.unique) { var ub = document.createElement('span'); ub.className = 'badge uniq'; ub.textContent = 'UNIQUE'; kr.appendChild(ub); }
                        if (hasKDet && detailOpen[kdkey]) {
                            // Attribute summary line.
                            var attrs = (k.keyType || 'KEY')
                                + (k.primary ? ' · Primary' : '') + (k.unique ? ' · Unique' : '')
                                + (k.caseSensitive ? ' · Case Sensitive' : '');
                            var head = '<span class="attr">' + attrs + '</span>';
                            if (k.description) head += '<span class="cmt">  ! ' + esc(k.description) + '</span>';
                            detailPanel(84, head);
                            // Each component field on its own readable line (name / type / picture).
                            (k.components || []).forEach(function (comp) {
                                var cins = ff.prefix ? ff.prefix + ':' + comp.name : comp.name;
                                var crow = makeRow('comp-row', null, comp.name, comp.type || '',
                                    comp.name + (comp.type ? '  ' + comp.type : ''), cins);
                                crow.style.paddingLeft = '92px';
                                if (comp.picture) {
                                    var cp = document.createElement('span');
                                    cp.className = 'picture'; cp.textContent = comp.picture; crow.appendChild(cp);
                                }
                                list.appendChild(crow);
                            });
                        }
                    });
                }

                // Columns sub-folder — LEFT-aligned columns via a per-table subgrid (.fgrid). The twisty + "+"
                // gutter lives inside the name cell so the type/picture columns stay aligned across rows and
                // nesting depths; detail panels are appended into the grid and span all tracks.
                var cols = ff.columns || [];
                if (cols.length) {
                    var ckey = fkey + '/cols';
                    var cOpen = !localCollapsed[ckey] || !!f;
                    gutterRow('table-hdr', 'Columns', '', null, 28, true, cOpen,
                        function () { localCollapsed[ckey] = !localCollapsed[ckey]; render(); }, null);
                    if (cOpen) {
                        var cgrid = document.createElement('div');
                        cgrid.className = 'fgrid';
                        list.appendChild(cgrid);
                        var walk = function (arr, depth) {
                            arr.forEach(function (c) {
                                if (!colMatch(c)) return;
                                var kids = c.children || [];
                                var hasKids = kids.length > 0;
                                var nkey = ckey + '/' + c.name;
                                var open = hasKids && (!localCollapsed[nkey] || !!f);
                                var ins = ff.prefix ? ff.prefix + ':' + c.name : c.name;
                                var cdkey = 'd:' + nkey;
                                var hasCDet = !!(c.description || c.derivedFrom);

                                var row = document.createElement('div');
                                row.className = 'row frow col-row';
                                row.title = c.name + (c.type ? '  ' + c.type : '') + (c.picture ? '  ' + c.picture : '');

                                // Column 1: gutter (twisty + "+") + name, indented for nesting.
                                var gcell = document.createElement('div');
                                gcell.className = 'gcell';
                                gcell.style.paddingLeft = (depth * 16) + 'px';
                                var tw = document.createElement('span'); tw.className = 'twisty';
                                tw.textContent = hasKids ? (open ? '▾' : '▸') : '';
                                gcell.appendChild(tw);
                                var plus = document.createElement('span'); plus.className = 'detail-tog';
                                if (hasCDet) {
                                    plus.textContent = detailOpen[cdkey] ? '−' : '+';
                                    plus.title = 'Show details';
                                    plus.addEventListener('click', function (e) {
                                        e.stopPropagation(); detailOpen[cdkey] = !detailOpen[cdkey]; render();
                                    });
                                }
                                gcell.appendChild(plus);
                                var nm = document.createElement('span'); nm.className = 'name'; nm.textContent = c.name;
                                gcell.appendChild(nm);
                                row.appendChild(gcell);

                                // Column 2: type. Column 3: picture (empty cell keeps the 3-track grid).
                                var ty = document.createElement('div'); ty.className = 'type'; ty.textContent = c.type || '';
                                row.appendChild(ty);
                                var pc = document.createElement('div'); pc.className = 'picture'; pc.textContent = c.picture || '';
                                row.appendChild(pc);

                                row.addEventListener('dblclick', function () { insert(ins); });
                                makeDraggable(row, ins);
                                if (hasKids) {
                                    tw.style.cursor = 'pointer';   // chevron-only expand/collapse
                                    tw.addEventListener('click', function (e) {
                                        e.stopPropagation(); localCollapsed[nkey] = !localCollapsed[nkey]; render();
                                    });
                                }
                                cgrid.appendChild(row);

                                if (hasCDet && detailOpen[cdkey]) {
                                    var dl = [];
                                    if (c.description) dl.push('<span class="cmt">! ' + esc(c.description) + '</span>');
                                    if (c.derivedFrom) dl.push('<span class="attr">derived from ' + esc(c.derivedFrom) + '</span>');
                                    var d = document.createElement('div');
                                    d.className = 'detail';
                                    d.style.paddingLeft = (40 + depth * 16) + 'px';
                                    d.innerHTML = dl.join('<br>');
                                    cgrid.appendChild(d); // spans all tracks via .fgrid .detail
                                }
                                if (open) walk(kids, depth + 1);
                            });
                        };
                        walk(cols, 0);
                    }
                }

                // Relations sub-folder — only when the table has relations; COLLAPSED BY DEFAULT (unlike
                // Keys/Columns). Expand → one row per related table (type shown dimmed); each row's "+"
                // opens a detail panel with the primary/foreign keys and the column mappings.
                var rels = (ff.relations || []).filter(function (r) { return match(r.name) || match(r.type); });
                if (rels.length) {
                    var rkey = fkey + '/rels';
                    var rOpen = !!relExpanded[rkey] || !!f;   // absent = collapsed
                    gutterRow('table-hdr', 'Relations', '', null, 28, true, rOpen,
                        function () { relExpanded[rkey] = !relExpanded[rkey]; render(); }, null);
                    if (rOpen) rels.forEach(function (r) {
                        var rdkey = 'd:' + rkey + '/' + r.name;
                        var hasRDet = !!(r.primaryKey || r.foreignKey || (r.mappings && r.mappings.length));
                        gutterRow('col-row', r.name, r.type || '', r.name, 44, false, false, null,
                            hasRDet ? rdkey : null);
                        if (hasRDet && detailOpen[rdkey]) {
                            var dl = [];
                            if (r.primaryKey) dl.push('<span class="attr">Primary Key: ' + esc(r.primaryKey) + '</span>');
                            if (r.foreignKey) dl.push('<span class="attr">Foreign Key: ' + esc(r.foreignKey) + '</span>');
                            if (dl.length) detailPanel(84, dl.join('<br>'));
                            (r.mappings || []).forEach(function (m) {
                                var mrow = makeRow('comp-row', null,
                                    (m.from || '?') + '  →  ' + (m.to || '?'), '', 'column mapping', null);
                                mrow.style.paddingLeft = '92px';
                                list.appendChild(mrow);
                            });
                        }
                    });
                }
            });
        }

        // File-Browsing List Box (the procedure's PRIMARY browse file + key), then Declared Tables
        // (the program's <app>.clw file set), then Other Files — all use the same rich renderer.
        richFileSection('browseFiles', 'File-Browsing List Box', browseFiles);
        richFileSection('tables', 'Declared Tables', tables);
        richFileSection('otherFiles', 'Other Files', otherFiles);

        // ----- Flat scopes -----
        function flatSection(key, label, items, action) {
            var shown = items.filter(function (it) { return match(it.name); });
            if (!shown.length) return;
            if (!sectionHeader(key, label, shown.length)) return;
            shown.forEach(function (it) {
                list.appendChild(makeRow(null, null, it.name, it.type || '',
                    it.name + (it.type ? '  ' + it.type : ''), it.name, action));
            });
        }

        // Routines: name + an underlined, clickable LINE NUMBER (click -> go to its declaration). The line#
        // is the only click target (single-click on the row is inert — reserved for future drag & drop, and
        // avoids the "too-slow double-click loses your place" trap). Double-click pastes "DO <name>".
        function routineSection(items) {
            var shown = items.filter(function (it) { return match(it.name); });
            if (!shown.length) return;
            if (!sectionHeader('routines', 'Routines', shown.length)) return;
            shown.forEach(function (it) {
                var row = document.createElement('div');
                row.className = 'row';
                row.title = it.name + '  ROUTINE' + (it.line ? '  (line ' + it.line + ')' : '');
                var n = document.createElement('span'); n.className = 'name'; n.textContent = it.name; row.appendChild(n);
                if (it.line) {
                    var ln = document.createElement('span'); ln.className = 'lineno';
                    ln.textContent = it.line; ln.title = 'Go to line ' + it.line;
                    ln.addEventListener('click', function (e) { e.stopPropagation(); postToHost({ action: 'goto', name: it.name }); });
                    row.appendChild(ln);
                }
                row.addEventListener('dblclick', function () { insert('DO ' + it.name); });
                makeDraggable(row, 'DO ' + it.name);
                list.appendChild(row);
            });
        }

        // Procedures: name + parameter list. Single-click SELECTS a row (highlight); the header "Open" button
        // opens the selected procedure in a new CA Embeditor. Double-click pastes "<name>()" at the cursor.
        function procedureSection(items) {
            var shown = items.filter(function (it) { return match(it.name) || match(it.params); });
            if (!shown.length) return;
            var openSel = function () { if (selectedProc) postToHost({ action: 'open', name: selectedProc }); };
            if (!sectionHeader('procedures', 'Procedures', shown.length, null,
                [{ label: '↗ Open', title: 'Open selected Procedure in CA Embeditor', onClick: openSel }])) return;
            shown.forEach(function (it) {
                var row = document.createElement('div');
                row.className = 'row' + (selectedProc === it.name ? ' selected' : '');
                row.title = it.name + (it.params || '');
                var n = document.createElement('span'); n.className = 'name'; n.textContent = it.name; row.appendChild(n);
                if (it.params) { var p = document.createElement('span'); p.className = 'params'; p.textContent = it.params; row.appendChild(p); }
                row.addEventListener('click', function (e) { if (e.detail > 1 || e.ctrlKey || e.metaKey || e.shiftKey) return; selSet = {}; selectedProc = it.name; render(); });
                row.addEventListener('dblclick', function () { insert(it.name + '()'); });
                makeDraggable(row, it.name + '()', false);   // plain click = select-for-Open (handled above), not multi-select
                list.appendChild(row);
            });
        }

        // ----- Tree scope: declaration order, QUEUE/GROUP expandable to nested members, picture column.
        //       Used by both Local Data and Global Data (the .txa gives both the same shape). -----
        function treeSection(key, label, items) {
            var esc = function (s) {
                return (s == null ? '' : String(s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            };
            var anyMatch = function (arr) {
                return (arr || []).some(function (it) { return matchAny(it.name, it.prompt, it.header) || anyMatch(it.children); });
            };
            var countAll = function (arr) {
                return (arr || []).reduce(function (n, it) { return n + 1 + countAll(it.children); }, 0);
            };
            var shown = items.filter(function (it) { return matchAny(it.name, it.prompt, it.header) || anyMatch(it.children); });
            if (!shown.length) return;
            if (!sectionHeader(key, label, countAll(items), { kind: 'tree', items: items })) return;

            // Per-section grid: subgrid rows share its max-content columns, so name/type/picture form real
            // LEFT-aligned columns (type starts past the longest name, picture past the longest type).
            var grid = document.createElement('div');
            grid.className = 'tgrid';
            list.appendChild(grid);

            var walk = function (arr, depth, parentKey) {
                arr.forEach(function (it) {
                    var kids = it.children || [];
                    if (!matchAny(it.name, it.prompt, it.header) && !anyMatch(kids)) return;
                    var nkey = parentKey + '/' + (it.name || '');
                    var hasKids = kids.length > 0;
                    var open = hasKids && (!localCollapsed[nkey] || !!f);
                    // [10] '+' detail for Local/Global rows — reveals prompt/header (the metadata not already
                    // shown in the type/picture columns), matching the Other Files/columns detail UX.
                    var dkey = 'd:' + nkey;
                    var hasDet = !!(it.prompt || it.header);
                    var tip = it.name + (it.type ? '  ' + it.type : '')
                        + (it.picture ? '  ' + it.picture : '')
                        + (it.prompt ? '\nPrompt: ' + it.prompt : '')
                        + (it.header ? '\nHeader: ' + it.header : '');

                    var row = document.createElement('div');
                    row.className = 'row trow';
                    row.title = tip;

                    // Column 1: name cell — twisty + name, indent absorbed here (keeps cols 2/3 aligned).
                    var namecell = document.createElement('div');
                    namecell.className = 'namecell';
                    namecell.style.paddingLeft = (depth * 16) + 'px';
                    var tw = document.createElement('span');
                    tw.className = 'twisty';
                    tw.textContent = hasKids ? (open ? '▾' : '▸') : '';
                    namecell.appendChild(tw);
                    var plus = document.createElement('span'); plus.className = 'detail-tog';
                    if (hasDet) {
                        plus.textContent = detailOpen[dkey] ? '−' : '+';
                        plus.title = 'Show details';
                        plus.addEventListener('click', function (e) {
                            e.stopPropagation(); detailOpen[dkey] = !detailOpen[dkey]; render();
                        });
                    }
                    namecell.appendChild(plus);
                    var nm = document.createElement('span');
                    nm.className = 'name'; nm.textContent = it.name;
                    namecell.appendChild(nm);
                    row.appendChild(namecell);

                    // Column 2: type. Column 3: picture (empty cell keeps the 3-track grid consistent).
                    var ty = document.createElement('div');
                    ty.className = 'type'; ty.textContent = it.type || '';
                    row.appendChild(ty);
                    var pc = document.createElement('div');
                    pc.className = 'picture'; pc.textContent = it.picture || '';
                    row.appendChild(pc);

                    if (it.name) { row.addEventListener('dblclick', function () { insert(it.name); }); makeDraggable(row, it.name); }
                    if (hasKids) {
                        tw.style.cursor = 'pointer';   // chevron-only expand/collapse
                        tw.addEventListener('click', function (e) {
                            e.stopPropagation(); localCollapsed[nkey] = !localCollapsed[nkey]; render();
                        });
                    }
                    grid.appendChild(row);
                    if (hasDet && detailOpen[dkey]) {
                        var dd = [];
                        if (it.prompt) dd.push('<span class="attr">Prompt: ' + esc(it.prompt) + '</span>');
                        if (it.header) dd.push('<span class="attr">Header: ' + esc(it.header) + '</span>');
                        var dv = document.createElement('div');
                        dv.className = 'detail';
                        // Align the detail text under the NAME: row pad (10) + namecell indent (depth*16)
                        // + twisty (12) + gap (6) + "+" toggle (12) + gap (6) = 46 + depth*16.
                        dv.style.paddingLeft = (46 + depth * 16) + 'px';
                        dv.innerHTML = dd.join('<br>');
                        grid.appendChild(dv); // spans all tracks via .tgrid .detail
                    }
                    if (open) walk(kids, depth + 1, nkey);
                });
            };
            walk(items, 0, key);
        }

        treeSection('locals', 'Local Data', locals);

        routineSection(routines);
        flatSection('moduleData', 'Module Data', moduleData);
        treeSection('globals', 'Global Data', globals);
        procedureSection(procedures);

        if (!list.childNodes.length) {
            list.innerHTML = '<div class="empty">No data. Open a procedure in the CA Embeditor and Refresh. (Declared Tables come from the generated &lt;app&gt;.clw with live-dictionary schema; Other Files from the .txa; Local/Global Data from the app .txa.)</div>';
        }
        scheduleSaveUiState();
    }

    document.getElementById('refreshBtn').addEventListener('click', function () { postToHost({ action: 'refresh' }); });
    document.getElementById('filter').addEventListener('input', render);
    // Escape clears the multi-selection (unless the filter box has focus / text — let it clear the filter there).
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && Object.keys(selSet).length) {
            var inFilter = document.activeElement === document.getElementById('filter');
            if (!inFilter) { e.preventDefault(); selSet = {}; lastSel = null; applySel(); }
        }
    });

    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.addEventListener('message', function (e) {
            var msg = e.data;
            if (typeof msg === 'string') { try { msg = JSON.parse(msg); } catch (ex) { return; } }
            if (msg.type === 'restoreUiState') {
                // Restore persisted collapse/expand state BEFORE the first data render. No render here — the
                // setSymbols that follows does it (and reads these maps).
                try {
                    var st = typeof msg.state === 'string' ? JSON.parse(msg.state) : msg.state;
                    if (st) {
                        if (st.sectionCollapsed) sectionCollapsed = st.sectionCollapsed;
                        if (st.localCollapsed) localCollapsed = st.localCollapsed;
                        if (st.relExpanded) relExpanded = st.relExpanded;
                        if (st.detailOpen) detailOpen = st.detailOpen;
                    }
                } catch (ex) {}
                return;
            }
            if (msg.type === 'setSymbols') {
                document.getElementById('title').textContent = msg.title || 'Data';
                var byName = function (a, b) { return (a.name || '').toLowerCase().localeCompare((b.name || '').toLowerCase()); };
                locals = (msg.locals || []).slice(); // declaration order — matches Clarion's native Data pad; do NOT sort
                otherFiles = (msg.otherFiles || []).slice().sort(byName); // Clarion lists Other Files alphabetically
                routines = (msg.routines || []).slice().sort(byName);
                moduleData = (msg.moduleData || []).slice().sort(byName);
                globals = (msg.globals || []).slice(); // declaration order from the .txa [PROGRAM][DATA]; do NOT sort
                procedures = (msg.procedures || []).slice().sort(byName);
                tables = (msg.tables || []).slice().sort(byName); // alphabetical, like Other Files; keep dict column order
                browseFiles = (msg.browseFiles || []).slice(); // 0..1 primary browse file; keep as-is
                render();
            }
        });
    }

    postToHost({ action: 'ready' });
</script>
</body>
</html>
