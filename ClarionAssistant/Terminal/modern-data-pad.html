<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Data</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 12px;
        background: #eff1f5; color: #4c4f69; overflow: hidden; }
    #bar { display: flex; align-items: center; gap: 8px; padding: 5px 8px;
        background: #dce0e8; border-bottom: 1px solid #bcc0cc; height: 30px; }
    #bar .title { font-weight: 600; color: #4c4f69; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #bar button { font: inherit; padding: 2px 8px; border: 1px solid #acb0be; border-radius: 4px;
        background: transparent; color: #1e66f5; cursor: pointer; }
    #bar button:hover { background: #ccd0da; }
    #filter { width: 100%; padding: 4px 8px; border: none; border-bottom: 1px solid #bcc0cc;
        font: inherit; background: #e6e9ef; color: #4c4f69; }
    #list { position: absolute; top: 56px; left: 0; right: 0; bottom: 0; overflow-y: auto; }
    .section { font-weight: 600; color: #6c6f85; background: #e6e9ef; padding: 4px 10px;
        border-top: 1px solid #bcc0cc; border-bottom: 1px solid #bcc0cc; }
    .row { display: flex; align-items: center; gap: 8px; padding: 3px 10px; cursor: pointer; user-select: none; }
    .row:hover { background: #ccd0da; }
    .row .kind { font-size: 10px; color: #8839ef; min-width: 56px; }
    .row .name { color: #4c4f69; }
    .row .type { font-size: 10px; color: #8c8fa1; margin-left: auto; }
    .table-hdr { font-weight: 600; color: #1e66f5; }
    .table-hdr .twisty { color: #6c6f85; min-width: 12px; }
    .col-row { padding-left: 26px; }
    .col-row .name { color: #d20f39; }
    .empty { padding: 14px; color: #8c8fa1; }
</style>
</head>
<body>
    <div id="bar">
        <span class="title" id="title">Data</span>
        <button id="refreshBtn" title="Refresh from the active Modern Embeditor">Refresh</button>
    </div>
    <input id="filter" placeholder="Filter…" />
    <div id="list"><div class="empty">Open a procedure in the Modern Embeditor, then Refresh.</div></div>

<script>
    var locals = [];
    var tables = [];
    var routines = [];
    var globals = [];
    var collapsed = {};        // tableName -> true when a table's columns are collapsed
    var sectionCollapsed = {}; // section key -> true when a whole section is collapsed

    // LSP SymbolKind -> short label
    function kindLabel(k) {
        switch (k) {
            case 5: return 'class'; case 6: return 'method'; case 7: return 'property';
            case 8: return 'field'; case 10: return 'enum'; case 12: return 'function';
            case 13: return 'var'; case 14: return 'const'; case 18: return 'array';
            case 19: return 'group'; case 22: return 'member'; case 23: return 'struct';
            default: return '';
        }
    }

    function postToHost(obj) {
        try { window.chrome.webview.postMessage(JSON.stringify(obj)); } catch (e) {}
    }

    function insert(name) { postToHost({ action: 'insert', name: name }); }

    function makeRow(cls, kindText, nameText, typeText, title, insertText) {
        var row = document.createElement('div');
        row.className = 'row' + (cls ? ' ' + cls : '');
        row.title = title || nameText;
        if (kindText !== null) { var k = document.createElement('span'); k.className = 'kind'; k.textContent = kindText; row.appendChild(k); }
        var n = document.createElement('span'); n.className = 'name'; n.textContent = nameText; row.appendChild(n);
        if (typeText) { var t = document.createElement('span'); t.className = 'type'; t.textContent = typeText; row.appendChild(t); }
        if (insertText) row.addEventListener('dblclick', function () { insert(insertText); });
        return row;
    }

    function render() {
        var f = (document.getElementById('filter').value || '').trim().toLowerCase();
        var match = function (s) { return !f || (s && s.toLowerCase().indexOf(f) >= 0); };
        var list = document.getElementById('list');
        list.innerHTML = '';

        function sectionHeader(key, label, count) {
            var open = !sectionCollapsed[key] || !!f; // force-open while filtering
            var sec = document.createElement('div');
            sec.className = 'section';
            sec.style.cursor = 'pointer';
            sec.textContent = (open ? '▾ ' : '▸ ') + label + '  (' + count + ')';
            sec.addEventListener('click', function () { sectionCollapsed[key] = !sectionCollapsed[key]; render(); });
            list.appendChild(sec);
            return open;
        }

        // ----- Tables (used by this procedure), each expandable to columns + keys -----
        var shownTables = tables.filter(function (t) {
            return match(t.name) || (t.columns || []).some(function (c) { return match(c.name); });
        });
        if (shownTables.length && sectionHeader('tables', 'Tables', shownTables.length)) {
            shownTables.forEach(function (t) {
                var tOpen = !collapsed[t.name] || !!f;
                var hdr = makeRow('table-hdr', null, t.name, t.prefix ? t.prefix + ':' : '',
                    t.name + (t.prefix ? '  (' + t.prefix + ':)' : ''), t.name);
                var tw = document.createElement('span'); tw.className = 'twisty'; tw.textContent = tOpen ? '▾' : '▸';
                hdr.insertBefore(tw, hdr.firstChild);
                hdr.addEventListener('click', function (e) {
                    if (e.detail > 1) return; // ignore the click half of a double-click
                    collapsed[t.name] = !collapsed[t.name]; render();
                });
                list.appendChild(hdr);
                if (tOpen) {
                    (t.keys || []).forEach(function (k) {
                        if (match(k)) list.appendChild(makeRow('col-row', 'key', k, '', 'key ' + k, k));
                    });
                    (t.columns || []).forEach(function (c) {
                        if (!match(c.name)) return;
                        var ins = (t.prefix ? t.prefix + ':' : '') + c.name;
                        list.appendChild(makeRow('col-row', null, c.name, c.type, ins, ins));
                    });
                }
            });
        }

        // ----- Flat scopes -----
        function flatSection(key, label, items) {
            var shown = items.filter(function (it) { return match(it.name); });
            if (!shown.length) return;
            if (!sectionHeader(key, label, shown.length)) return;
            shown.forEach(function (it) {
                list.appendChild(makeRow(null, null, it.name, it.type || '',
                    it.name + (it.type ? '  ' + it.type : ''), it.name));
            });
        }

        flatSection('locals', 'Local Data', locals);
        flatSection('routines', 'Routines', routines);
        flatSection('globals', 'Global Data', globals);

        if (!list.childNodes.length) {
            list.innerHTML = '<div class="empty">No data. Open a procedure in the Modern Embeditor and Refresh. (Tables/Global Data come from the generated &lt;app&gt;.clw; the app must be generated.)</div>';
        }
    }

    document.getElementById('refreshBtn').addEventListener('click', function () { postToHost({ action: 'refresh' }); });
    document.getElementById('filter').addEventListener('input', render);

    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.addEventListener('message', function (e) {
            var msg = e.data;
            if (typeof msg === 'string') { try { msg = JSON.parse(msg); } catch (ex) { return; } }
            if (msg.type === 'setSymbols') {
                document.getElementById('title').textContent = msg.title || 'Data';
                var byName = function (a, b) { return (a.name || '').toLowerCase().localeCompare((b.name || '').toLowerCase()); };
                locals = (msg.locals || []).slice().sort(byName);
                routines = (msg.routines || []).slice().sort(byName);
                globals = (msg.globals || []).slice().sort(byName);
                tables = (msg.tables || []).slice().sort(byName);
                tables.forEach(function (t) { if (t.columns) t.columns = t.columns.slice().sort(byName); });
                render();
            }
        });
    }

    postToHost({ action: 'ready' });
</script>
</body>
</html>
