<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  font-size: 13px;
  background: #1e1e2e;
  color: #cdd6f4;
  overflow-y: auto;
  overflow-x: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.home {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px 24px 32px;
}
.title { font-size: 18px; font-weight: 600; color: #89b4fa; margin-bottom: 6px; }
.subtitle { font-size: 12px; color: #6c7086; margin-bottom: 20px; }

/* Action bar */
.action-bar { display: flex; gap: 8px; margin-bottom: 14px; }
.btn {
  height: 28px; padding: 0 14px;
  border: 1px solid #45475a; border-radius: 4px;
  background: #313244; color: #cdd6f4;
  font-size: 12px; font-family: 'Segoe UI', sans-serif;
  cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.btn:hover { background: #45475a; border-color: #585b70; }
.btn:active { background: #585b70; }
.btn-primary { background: #1e66a8; border-color: #2580d4; color: #fff; font-weight: 600; }
.btn-primary:hover { background: #2580d4; }
.btn-accent { color: #89dceb; border-color: rgba(137,220,235,0.3); }
.btn-accent:hover { background: rgba(137,220,235,0.1); border-color: rgba(137,220,235,0.5); }

/* Table controls */
.table-controls {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 8px; gap: 16px;
}
.page-size-wrap { display: flex; align-items: center; gap: 6px; color: #7f849c; font-size: 12px; }
.page-size-wrap select {
  background: #313244; border: 1px solid #45475a;
  color: #cdd6f4; font-size: 12px;
  padding: 2px 6px; border-radius: 3px;
  cursor: pointer; font-family: 'Segoe UI', sans-serif; outline: none;
}
.search-wrap { display: flex; align-items: center; gap: 8px; color: #7f849c; font-size: 12px; }
.search-wrap input {
  background: #313244; border: 1px solid #45475a;
  color: #cdd6f4; font-size: 12px;
  padding: 3px 8px; border-radius: 3px;
  font-family: 'Segoe UI', sans-serif; width: 190px; outline: none;
}
.search-wrap input:focus { border-color: #89b4fa; }

/* Table */
.solutions-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
.solutions-table thead th {
  text-align: left; font-size: 11px; font-weight: 600;
  color: #7f849c; padding: 7px 10px;
  border-top: 1px solid #313244; border-bottom: 1px solid #313244;
  text-transform: uppercase; letter-spacing: 0.4px;
  white-space: nowrap; cursor: pointer;
}
.solutions-table thead th:hover { color: #a6adc8; }
.solutions-table thead th.col-expand,
.solutions-table thead th.col-actions { cursor: default; }
.solutions-table thead th .sort-arrow { margin-left: 3px; opacity: 0.4; }
.solutions-table thead th.sort-asc .sort-arrow,
.solutions-table thead th.sort-desc .sort-arrow { opacity: 1; color: #89b4fa; }

.solutions-table tbody td {
  padding: 7px 10px; border-bottom: 1px solid #232334; vertical-align: middle;
}
.solution-row:hover td { background: #2a2a3e; }
.col-expand { width: 38px; }
.col-actions { width: 68px; }

/* Expand toggle button */
.expand-btn {
  background: none; border: 1px solid #45475a; color: #7f849c;
  cursor: pointer; font-size: 12px; font-weight: 700;
  width: 20px; height: 20px; border-radius: 3px;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.12s; line-height: 1; font-family: monospace;
}
.expand-btn:hover { border-color: #89b4fa; color: #89b4fa; }
.expand-btn.open { background: #1e66a8; border-color: #2580d4; color: #fff; }

/* Cell content */
.solution-name { color: #89b4fa; font-weight: 500; cursor: pointer; }
.solution-name:hover { text-decoration: underline; }
.solution-modified { color: #7f849c; font-size: 12px; white-space: nowrap; }
.solution-path {
  color: #6c7086; font-size: 11px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 380px; display: inline-block; vertical-align: middle;
}

/* Row action buttons */
.row-actions { display: flex; align-items: center; gap: 3px; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  padding: 3px 5px; border-radius: 3px;
  font-size: 13px; line-height: 1; transition: all 0.12s;
}
.icon-btn-del { color: #f38ba8; background: rgba(243,139,168,0.12); }
.icon-btn-del:hover { background: rgba(243,139,168,0.28); }
.icon-btn-folder { color: #89dceb; background: rgba(137,220,235,0.12); }
.icon-btn-folder:hover { background: rgba(137,220,235,0.28); }

/* Expand detail panel */
.detail-row td { padding: 0; border-bottom: 1px solid #313244; }
.detail-panel {
  padding: 12px 50px 14px;
  display: grid; grid-template-columns: 130px 1fr;
  gap: 6px 12px; background: #181825;
}
.detail-label {
  font-size: 11px; font-weight: 600; color: #7f849c;
  text-transform: uppercase; letter-spacing: 0.5px;
  text-align: right; white-space: nowrap;
  background: #313244; border-radius: 3px;
  padding: 2px 8px; align-self: start;
}
.detail-value {
  font-size: 12px; color: #cdd6f4;
  display: flex; align-items: center; gap: 6px; padding: 2px 0;
  word-break: break-all;
}

/* Table footer */
.table-footer {
  display: flex; justify-content: space-between;
  align-items: center; margin-top: 6px; min-height: 28px;
}
.showing-info { font-size: 12px; color: #7f849c; }
.pagination { display: flex; gap: 3px; align-items: center; }
.page-btn {
  background: #313244; border: 1px solid #45475a;
  color: #cdd6f4; font-size: 12px;
  padding: 3px 9px; border-radius: 3px;
  cursor: pointer; font-family: 'Segoe UI', sans-serif;
  min-width: 28px; text-align: center;
  transition: all 0.12s;
}
.page-btn:hover { background: #45475a; }
.page-btn.active { background: #1e66a8; border-color: #2580d4; color: #fff; font-weight: 600; }
.page-btn[disabled] { opacity: 0.35; cursor: default; pointer-events: none; }

.empty-state {
  text-align: center; color: #6c7086;
  padding: 40px 0; font-size: 13px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #585b70; }

/* ====== Light theme ====== */
body.light { background: #eff1f5; color: #4c4f69; }
body.light .title { color: #1e66f5; }
body.light .subtitle { color: #8c8fa1; }
body.light .btn { border-color: #bcc0cc; background: #e6e9ef; color: #4c4f69; }
body.light .btn:hover { background: #ccd0da; border-color: #acb0be; }
body.light .btn-primary { background: #1e66f5; border-color: #1e66f5; color: #fff; }
body.light .btn-primary:hover { background: #3b8cf8; }
body.light .btn-accent { color: #04a5e5; border-color: rgba(4,165,229,0.3); }
body.light .btn-accent:hover { background: rgba(4,165,229,0.1); }
body.light .page-size-wrap { color: #6c6f85; }
body.light .page-size-wrap select { background: #e6e9ef; border-color: #bcc0cc; color: #4c4f69; }
body.light .search-wrap { color: #6c6f85; }
body.light .search-wrap input { background: #e6e9ef; border-color: #bcc0cc; color: #4c4f69; }
body.light .search-wrap input:focus { border-color: #1e66f5; }
body.light .solutions-table thead th { color: #6c6f85; border-color: #ccd0da; }
body.light .solutions-table thead th:hover { color: #4c4f69; }
body.light .solutions-table thead th.sort-asc .sort-arrow,
body.light .solutions-table thead th.sort-desc .sort-arrow { color: #1e66f5; }
body.light .solutions-table tbody td { border-color: #dce0e8; }
body.light .solution-row:hover td { background: #e6e9ef; }
body.light .expand-btn { border-color: #bcc0cc; color: #6c6f85; }
body.light .expand-btn:hover { border-color: #1e66f5; color: #1e66f5; }
body.light .expand-btn.open { background: #1e66f5; border-color: #1e66f5; color: #fff; }
body.light .solution-name { color: #1e66f5; }
body.light .solution-modified { color: #6c6f85; }
body.light .solution-path { color: #8c8fa1; }
body.light .icon-btn-del { color: #d20f39; background: rgba(210,15,57,0.1); }
body.light .icon-btn-del:hover { background: rgba(210,15,57,0.22); }
body.light .icon-btn-folder { color: #1e66f5; background: rgba(30,102,245,0.1); }
body.light .icon-btn-folder:hover { background: rgba(30,102,245,0.22); }
body.light .detail-row td { }
body.light .detail-panel { background: #e6e9ef; }
body.light .detail-label { color: #5c5f77; background: #ccd0da; }
body.light .detail-value { color: #4c4f69; }
body.light .showing-info { color: #6c6f85; }
body.light .page-btn { background: #e6e9ef; border-color: #bcc0cc; color: #4c4f69; }
body.light .page-btn:hover { background: #ccd0da; }
body.light .page-btn.active { background: #1e66f5; border-color: #1e66f5; color: #fff; }
body.light .empty-state { color: #8c8fa1; }
body.light ::-webkit-scrollbar-thumb { background: #bcc0cc; }
body.light ::-webkit-scrollbar-thumb:hover { background: #acb0be; }
</style>
</head>
<body>
<div class="home">
  <div class="title">Clarion Assistant</div>
  <div class="subtitle">Select a solution to open a terminal in its folder, or browse for one.</div>

  <div class="action-bar">
    <button class="btn btn-primary" onclick="send('browseSolution')">&#128194; Open Solution...</button>
  </div>

  <div class="table-controls">
    <div class="page-size-wrap">
      <select id="pageSize" onchange="onPageSizeChange()">
        <option value="10">10</option>
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
      <span>records</span>
    </div>
    <div class="search-wrap">
      <span>Search:</span>
      <input type="text" id="searchInput" oninput="onSearch()" />
    </div>
  </div>

  <table class="solutions-table">
    <thead>
      <tr>
        <th class="col-expand"></th>
        <th id="th-name" onclick="sortBy('name')">Name <span class="sort-arrow">&#8597;</span></th>
        <th id="th-modifiedTs" onclick="sortBy('modifiedTs')" style="width:200px">Modified <span class="sort-arrow">&#8597;</span></th>
        <th id="th-path" onclick="sortBy('path')">Location <span class="sort-arrow">&#8597;</span></th>
        <th class="col-actions"></th>
      </tr>
    </thead>
    <tbody id="solutionList"></tbody>
  </table>

  <div class="table-footer">
    <div class="showing-info" id="showingInfo"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div id="emptyState" class="empty-state" style="display:none;">
    No recent solutions found. Click "Open Solution..." to get started.
  </div>
</div>

<script>
  var allItems = [];
  var filteredItems = [];
  var currentPage = 1;
  var pageSize = 10;
  var sortCol = 'modifiedTs';
  var sortDir = 'desc';
  var expandedIdx = -1;

  function send(action, data) {
    if (window.chrome && window.chrome.webview)
      window.chrome.webview.postMessage(JSON.stringify({ action: action, data: data || '' }));
  }

  /* ---- Formatting helpers ---- */
  function relativeTime(ts) {
    if (!ts) return '';
    var diff = Date.now() - ts;
    var sec = diff / 1000, min = sec / 60, hr = min / 60, day = hr / 24;
    var yr = day / 365.25, mo = day / 30.44;
    if (yr >= 2)  return Math.round(yr) + ' years ago';
    if (yr >= 1)  return 'a year ago';
    if (mo >= 2)  return Math.round(mo) + ' months ago';
    if (mo >= 1)  return 'a month ago';
    if (day >= 2) return Math.round(day) + ' days ago';
    if (day >= 1) return 'a day ago';
    if (hr >= 2)  return Math.round(hr) + ' hours ago';
    if (hr >= 1)  return 'an hour ago';
    return 'just now';
  }

  var MON_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var MON_LONG  = ['January','February','March','April','May','June',
                   'July','August','September','October','November','December'];
  var DAY_LONG  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  function fmtShort(item) {
    if (!item.modifiedTs) return item.modified || '';
    var d = new Date(item.modifiedTs);
    return relativeTime(item.modifiedTs) + ' - ' + MON_SHORT[d.getMonth()] + ' ' + d.getDate() + ' ' + d.getFullYear();
  }

  function fmtFull(item) {
    if (!item.modifiedTs) return item.modified || '';
    var d = new Date(item.modifiedTs);
    var h = d.getHours(), m = d.getMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    m = (m < 10 ? '0' : '') + m;
    return DAY_LONG[d.getDay()] + ', ' + MON_LONG[d.getMonth()] + ' ' + d.getDate() +
           ' ' + d.getFullYear() + ' ' + h + ':' + m + ' ' + ampm;
  }

  function fmtSize(bytes) {
    if (!bytes || bytes <= 0) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(2) + ' kB';
    return (bytes / 1048576).toFixed(2) + ' MB';
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    if (!s) return '';
    return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")
      .replace(/"/g,'&quot;').replace(/\n/g,'\\n').replace(/\r/g,'\\r');
  }

  /* ---- Filtering & sorting ---- */
  function applyFilter() {
    var q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    filteredItems = q
      ? allItems.filter(function(s) {
          return s.name.toLowerCase().indexOf(q) >= 0 || s.path.toLowerCase().indexOf(q) >= 0;
        })
      : allItems.slice();
    applySort();
  }

  function applySort() {
    filteredItems.sort(function(a, b) {
      var av = a[sortCol] || (typeof a[sortCol] === 'number' ? 0 : '');
      var bv = b[sortCol] || (typeof b[sortCol] === 'number' ? 0 : '');
      if (typeof av === 'number' && typeof bv === 'number')
        return sortDir === 'asc' ? av - bv : bv - av;
      av = String(av).toLowerCase(); bv = String(bv).toLowerCase();
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    currentPage = 1;
    expandedIdx = -1;
    render();
  }

  function sortBy(col) {
    if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortCol = col; sortDir = col === 'modifiedTs' ? 'desc' : 'asc'; }
    updateSortHeaders();
    applySort();
  }

  function updateSortHeaders() {
    ['name','modifiedTs','path'].forEach(function(c) {
      var th = document.getElementById('th-' + c);
      if (!th) return;
      var arrow = th.querySelector('.sort-arrow');
      if (c === sortCol) {
        th.className = sortDir === 'asc' ? 'sort-asc' : 'sort-desc';
        if (arrow) arrow.innerHTML = sortDir === 'asc' ? '&#8593;' : '&#8595;';
      } else {
        th.className = '';
        if (arrow) arrow.innerHTML = '&#8597;';
      }
    });
  }

  function onPageSizeChange() {
    pageSize = parseInt(document.getElementById('pageSize').value, 10);
    currentPage = 1; expandedIdx = -1;
    render();
  }

  function onSearch() { applyFilter(); }

  function goToPage(p) {
    currentPage = p; expandedIdx = -1;
    render();
  }

  function toggleExpand(globalIdx) {
    expandedIdx = (expandedIdx === globalIdx) ? -1 : globalIdx;
    render();
  }

  /* ---- Render ---- */
  function render() {
    var tbody = document.getElementById('solutionList');
    var emptyEl = document.getElementById('emptyState');
    var showingEl = document.getElementById('showingInfo');
    var pagEl = document.getElementById('pagination');

    var total = filteredItems.length;
    var totalPages = Math.max(1, Math.ceil(total / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;

    var start = (currentPage - 1) * pageSize;
    var end = Math.min(start + pageSize, total);

    if (total === 0) {
      tbody.innerHTML = '';
      emptyEl.style.display = 'block';
      showingEl.textContent = '';
      pagEl.innerHTML = '';
      return;
    }

    emptyEl.style.display = 'none';
    showingEl.textContent = total === 1
      ? 'Showing 1 entry'
      : 'Showing ' + (start + 1) + ' to ' + end + ' of ' + total + ' entries';

    var pageItems = filteredItems.slice(start, end);
    var html = '';

    for (var i = 0; i < pageItems.length; i++) {
      var gi = start + i;
      var s = pageItems[i];
      var isOpen = (expandedIdx === gi);
      var btnClass = isOpen ? 'expand-btn open' : 'expand-btn';
      var btnSym = isOpen ? '&#8722;' : '&#43;';

      html +=
        '<tr class="solution-row">' +
          '<td class="col-expand">' +
            '<button class="' + btnClass + '" onclick="event.stopPropagation();toggleExpand(' + gi + ')" title="Details">' + btnSym + '</button>' +
          '</td>' +
          '<td><span class="solution-name" onclick="send(\'openSolution\',\'' + escAttr(s.path) + '\')">' + esc(s.name) + '</span></td>' +
          '<td><span class="solution-modified">' + esc(fmtShort(s)) + '</span></td>' +
          '<td><span class="solution-path" title="' + esc(s.path) + '">' + esc(s.path) + '</span></td>' +
          '<td>' +
            '<div class="row-actions">' +
              '<button class="icon-btn icon-btn-del" title="Hide from list" onclick="event.stopPropagation();send(\'removeSolution\',\'' + escAttr(s.path) + '\')">&#128465;</button>' +
              '<button class="icon-btn icon-btn-folder" title="Open folder" onclick="event.stopPropagation();send(\'openFolder\',\'' + escAttr(s.path) + '\')">&#128193;</button>' +
            '</div>' +
          '</td>' +
        '</tr>';

      if (isOpen) {
        html +=
          '<tr class="detail-row"><td colspan="5">' +
            '<div class="detail-panel">' +
              '<span class="detail-label">NAME</span>' +
              '<span class="detail-value">' + esc(s.name) + '</span>' +
              '<span class="detail-label">MODIFIED</span>' +
              '<span class="detail-value">' + esc(fmtFull(s)) + '</span>' +
              '<span class="detail-label">LOCATION</span>' +
              '<span class="detail-value">' +
                '<button class="icon-btn icon-btn-del" title="Hide from list" onclick="send(\'removeSolution\',\'' + escAttr(s.path) + '\')">&#128465;</button>' +
                '<button class="icon-btn icon-btn-folder" title="Open folder" onclick="send(\'openFolder\',\'' + escAttr(s.path) + '\')">&#128193;</button>' +
                esc(s.path) +
              '</span>' +
              '<span class="detail-label">SIZE</span>' +
              '<span class="detail-value">' + esc(fmtSize(s.size)) + '</span>' +
            '</div>' +
          '</td></tr>';
      }
    }

    tbody.innerHTML = html;

    /* Pagination */
    if (totalPages <= 1) { pagEl.innerHTML = ''; return; }

    var ph = '';
    ph += '<button class="page-btn" onclick="goToPage(' + (currentPage - 1) + ')"' +
          (currentPage <= 1 ? ' disabled' : '') + '>&lt;</button>';

    var ps = Math.max(1, currentPage - 2);
    var pe = Math.min(totalPages, ps + 4);
    if (pe - ps < 4) ps = Math.max(1, pe - 4);

    for (var p = ps; p <= pe; p++) {
      ph += '<button class="page-btn' + (p === currentPage ? ' active' : '') +
            '" onclick="goToPage(' + p + ')">' + p + '</button>';
    }
    ph += '<button class="page-btn" onclick="goToPage(' + (currentPage + 1) + ')"' +
          (currentPage >= totalPages ? ' disabled' : '') + '>&gt;</button>';
    pagEl.innerHTML = ph;
  }

  function renderSolutions(items) {
    allItems = items || [];
    applyFilter();
  }

  /* ---- Messages from C# ---- */
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.addEventListener('message', function(e) {
      var msg = e.data;
      if (typeof msg === 'string') { try { msg = JSON.parse(msg); } catch(ex) { return; } }
      if (msg.type === 'setSolutions') renderSolutions(msg.items);
      if (msg.type === 'setTheme') {
        document.body.classList.toggle('light', msg.theme === 'light');
      }
    });
  }

  send('homeReady');
</script>
</body>
</html>
